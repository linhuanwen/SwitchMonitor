<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=8">
<style>
* { margin: 0; padding: 0; }
body {
    background: #1a1a2e;
    color: #e0e0e0;
    font: 14px SimSun, sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
}
.section { padding: 8px 10px; }
.section-title {
    font-size: 13px;
    color: #666;
    padding: 6px 10px 4px;
    border-bottom: 1px solid #2a2a4e;
    margin-bottom: 4px;
}

/* 下拉框统一样式 */
.sidebar-select {
    width: 100%;
    padding: 4px 6px;
    font: 14px SimSun, sans-serif;
    background: #252545;
    color: #e0e0e0;
    border: 1px solid #3a3a6e;
    outline: none;
}
.sidebar-select:focus {
    border-color: #4488FF;
}

/* 转辙机列表（已废弃，保留样式以防引用） */
.switch-list { list-style: none; }
.switch-list li {
    padding: 6px 12px;
    cursor: pointer;
    color: #aaa;
    border-left: 2px solid transparent;
}
.switch-list li:hover { background: #252545; color: #fff; }
.switch-list li.active {
    background: #2a2a5e;
    color: #fff;
    border-left: 2px solid #4488FF;
}

/* ===== 日历式日期选择器 ===== */
.calendar-container {
    margin-top: 2px;
}

/* 月份导航栏 */
.cal-header {
    text-align: center;
    padding: 3px 0 6px 0;
    position: relative;
    height: 24px;
    line-height: 24px;
}
.cal-nav {
    position: absolute;
    top: 0;
    width: 26px;
    height: 24px;
    background: #333355;
    color: #ccc;
    border: 1px solid #444466;
    font: 13px SimSun;
    cursor: pointer;
    text-align: center;
    line-height: 22px;
    padding: 0;
}
.cal-nav:hover { background: #444477; color: #fff; }
#calPrev { left: 0; }
#calNext { right: 0; }
.cal-month-year {
    color: #ddd;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    padding: 2px 6px;
}
.cal-month-year:hover {
    background: #333355;
}

/* 星期标题行 */
.cal-weekdays {
    overflow: hidden;
    border-bottom: 1px solid #2a2a4e;
    padding-bottom: 3px;
    margin-bottom: 3px;
}
.cal-weekdays span {
    float: left;
    width: 14.28%;
    text-align: center;
    font-size: 12px;
    color: #666;
    padding: 2px 0;
}

/* 日期网格 */
.cal-grid {
    overflow: hidden;
}
.cal-cell {
    float: left;
    width: 14.28%;
    text-align: center;
    padding: 2px 0;
    font-size: 13px;
    cursor: default;
    color: #444;
    font-family: Consolas, monospace;
    min-height: 26px;  /* 确保角标不撑高单元格导致浮动错位 */
}
.cal-row {
    clear: both;
    overflow: hidden;
}
.cal-cell.has-data {
    color: #ddd;
    cursor: pointer;
}
.cal-cell.has-data:hover {
    background: #333388;
    color: #fff;
}
.cal-cell.selected {
    background: #3366CC;
    color: #fff;
    font-weight: bold;
}
.cal-cell.today {
    color: #FFAA00;
}
.cal-cell.today.selected {
    color: #fff;
}

/* 月份选择面板 — 3列×4行 */
.cal-month-cell {
    float: left;
    width: 33.33%;
    text-align: center;
    padding: 5px 0;
    font-size: 14px;
    cursor: pointer;
    color: #ddd;
}
.cal-month-cell:hover {
    background: #333388;
    color: #fff;
}
.cal-month-cell.selected {
    background: #3366CC;
    color: #fff;
    font-weight: bold;
}
.cal-month-cell.no-data {
    color: #444;
    cursor: default;
}
.cal-month-cell.no-data:hover {
    background: transparent;
    color: #444;
}

/* 年份选择面板 — 3列×4行 */
.cal-year-cell {
    float: left;
    width: 33.33%;
    text-align: center;
    padding: 5px 0;
    font-size: 14px;
    cursor: pointer;
    color: #ddd;
}
.cal-year-cell:hover {
    background: #333388;
    color: #fff;
}
.cal-year-cell.selected {
    background: #3366CC;
    color: #fff;
    font-weight: bold;
}
.cal-year-cell.no-data {
    color: #444;
    cursor: default;
}
.cal-year-cell.no-data:hover {
    background: transparent;
    color: #444;
}

/* 时间列表 */
.time-container { position: relative; height: 240px; overflow-y: auto; }
.time-list { list-style: none; }
.time-list li {
    padding: 3px 10px;
    cursor: pointer;
    color: #aaa;
    font-family: Consolas, monospace;
        min-height: 24px;
    font-size: 15px;
}
.time-list li:hover { background: #252545; color: #fff; }
.time-list li.active {
    background: #2a2a5e;
    color: #FFAA00;
    font-weight: bold;
}

/* 空状态提示 */
.empty-hint {
    color: #555;
    text-align: center;
    padding: 20px 10px;
    font-size: 13px;
}

/* 信息提示 */
.info-text {
    color: #777;
    font-size: 12px;
    padding: 2px 8px;
    margin-top: 2px;
}

/* 时间列表级别着色 */
.time-list li.lvl-normal { color: #aaa; }
.time-list li.lvl-warning { color: #FFD54F; border-left: 3px solid #FFD54F; padding-left: 9px; }
.time-list li.lvl-alarm { color: #FF9800; border-left: 3px solid #FF9800; padding-left: 9px; }
.time-list li.lvl-fault { color: #FF4444; border-left: 3px solid #FF4444; padding-left: 9px; }
.time-list li.lvl-normal.active { color: #FFAA00; font-weight: bold; background: #2a2a5e; }
.time-list li.lvl-warning.active { color: #FFD54F; font-weight: bold; background: #2a2a5e; }
.time-list li.lvl-alarm.active { color: #FF9800; font-weight: bold; background: #2a2a5e; }
.time-list li.lvl-fault.active { color: #FF4444; font-weight: bold; background: #2a2a5e; }

/* 日期角标 */
.cal-badge {
    display: block;
    font-size: 11px;
    line-height: 1;
    margin-top: 1px;
}
.cal-badge-fault { color: #FF4444; }
.cal-badge-warning { color: #FF9800; }

/* 分割线 */
.divider { border: none; border-top: 1px solid #2a2a4e; margin: 4px 0; }

/* 站点状态指示灯 */
.site-status-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
}
.site-status-dot.online  { background: #44CC44; }
.site-status-dot.offline { background: #FF4444; }
.site-status-dot.unknown { background: #666666; }

/* 站点选择行 */
.site-row {
    overflow: hidden;
    margin-bottom: 4px;
}
.site-select-wrap {
    float: left;
    width: 72%;
}
.site-row .sidebar-select {
    width: 100%;
}

/* 补拉按钮 */
.catchup-btn {
    float: right;
    width: 25%;
    padding: 3px 4px;
    font: 12px SimSun;
    background: #335577;
    color: #ddd;
    border: 1px solid #446688;
    cursor: pointer;
    text-align: center;
}
.catchup-btn:hover {
    background: #446699;
    color: #fff;
}
.catchup-btn:disabled {
    background: #2a2a3e;
    color: #555;
    cursor: default;
    border-color: #333355;
}

/* 站点信息行（IP + 端口） */
.site-info {
    font-size: 11px;
    color: #555;
    padding: 2px 0;
}
</style>
</head>
<body>

<div class="section">
    <div class="section-title">站点 <span id="siteStatusDot" class="site-status-dot unknown"></span></div>
    <div class="site-row">
        <span class="site-select-wrap">
            <select id="siteSelect" class="sidebar-select" onchange="onSiteChange()">
            </select>
        </span>
        <button id="catchupBtn" class="catchup-btn" onclick="onCatchupClick()" disabled title="手动补拉数据">补拉</button>
    </div>
    <div class="site-info" id="siteInfo"></div>
</div>

<div class="section">
    <div class="section-title">转辙机号</div>
    <select id="switchSelect" class="sidebar-select" onchange="onSwitchChange()">
    </select>
</div>

<hr class="divider">

<div class="section">
    <div class="section-title">日期</div>
    <div class="calendar-container" id="calendarContainer">
        <div class="cal-header">
            <button class="cal-nav" id="calPrev" onclick="calPrevMonth()">◀</button>
            <span class="cal-month-year" id="calMonthYear" onclick="onHeaderClick()" title="点击选择月份/年份">----年--月</span>
            <button class="cal-nav" id="calNext" onclick="calNextMonth()">▶</button>
        </div>
        <div class="cal-weekdays" id="calWeekdays">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
        </div>
        <div class="cal-grid" id="calendarGrid">
            <div style="text-align:center;color:#555;padding:10px;">请选择转辙机</div>
        </div>
    </div>

    <hr class="divider">

<div class="section">
    <div class="section-title">动作时间</div>
    <div class="time-container" id="timeContainer">
        <ul class="time-list" id="timeList">
            <li class="empty-hint">请选择日期</li>
        </ul>
    </div>
    <div class="info-text" id="timeInfo"></div>
</div>

<script>
// ===== IE8 console polyfill（WebBrowser ScriptErrorsSuppressed=true 环境下需此项） =====
window.console = window.console || { log: function(){}, warn: function(){}, error: function(){} };

// ===== IE7/IE8 JSON 兼容层 =====
if (typeof JSON === 'undefined' || typeof JSON.parse === 'undefined') {
    window.JSON = { parse: function(t) { return (new Function('return ' + t))(); } };
}

var currentSwitchId = null;
var currentDate = null;
var currentTimestamp = null;

// ===== 日历状态 =====
var allDates = [];         // 全部有数据的日期字符串（降序）
var allDatesSet = {};      // 快速查找：date → true
var monthsWithData = {};   // 按年查找有数据的月份：{"2026": {1:true, 2:true, ...}}
var yearsWithData = {};   // 有数据的年份：{"2026": true, "2025": true}
var calView = 'day';       // 当前视图：'day' | 'month' | 'year'
var calYear = 0;           // 当前显示的年份
var calMonth = 0;          // 当前显示的月份
var todayStr = '';         // 今天的日期字符串 "yyyy-MM-dd"
var alarmBadges = {};      // D5: 日期角标数据 { "2026-01-29": {"预警":1,"报警":0,"故障":2}, ... }

// 初始化 todayStr
(function() {
    var now = new Date();
    var y = now.getFullYear();
    var m = now.getMonth() + 1;
    var d = now.getDate();
    todayStr = y + '-' + (m < 10 ? '0' : '') + m + '-' + (d < 10 ? '0' : '') + d;
})();

function onSiteChange() {
    var sel = document.getElementById('siteSelect');
    var siteId = sel.value;
    if (!siteId) return;

    // 通知 C#（放在最前面，避免后续 DOM 操作异常导致调用丢失）
    try { window.external.SelectSite(siteId); } catch(e) {}

    // 更新站点信息行
    var sitesJson = sel.getAttribute('data-sites');
    if (sitesJson) {
        try {
            var sites = JSON.parse(sitesJson);
            updateSiteInfo(sites, siteId);
        } catch(e) {}
    }

    // 更新状态灯和补拉按钮
    updateSelectedSiteDot(_siteStatuses);

    // 重置转辙机
    currentSwitchId = null;
    document.getElementById('switchSelect').selectedIndex = 0;

    // 重置日历
    allDates = [];
    allDatesSet = {};
    monthsWithData = {};
    yearsWithData = {};
    calView = 'day';
    calYear = 0;
    calMonth = 0;
    document.getElementById('calendarGrid').innerHTML = '<div style="text-align:center;color:#555;padding:10px;">加载中...</div>';
    document.getElementById('calMonthYear').innerText = '----年--月';

    // 清空时间列表
    document.getElementById('timeList').innerHTML = '<li class="empty-hint">加载中...</li>';
    document.getElementById('timeInfo').innerText = '';
}

// ===== 转辙机下拉框 =====
function populateSwitches(groups) {
    var sel = document.getElementById('switchSelect');
    sel.innerHTML = '';
    if (!groups || groups.length === 0) {
        var opt = document.createElement('option');
        opt.value = '';
        opt.innerText = '（无转辙机）';
        sel.appendChild(opt);
        return;
    }
    for (var i = 0; i < groups.length; i++) {
        var opt = document.createElement('option');
        opt.value = groups[i].Id || groups[i].id;
        opt.innerText = groups[i].Label || groups[i].label || groups[i].Id || groups[i].id;
        sel.appendChild(opt);
    }
}

function onSwitchChange() {
    var sel = document.getElementById('switchSelect');
    var switchId = sel.value;
    if (!switchId || switchId === currentSwitchId) return;

    currentSwitchId = switchId;
    currentDate = null;
    currentTimestamp = null;

    // 重置日历为加载状态
    allDates = [];
    allDatesSet = {};
    monthsWithData = {};
    yearsWithData = {};
    calView = 'day';
    calYear = 0;
    calMonth = 0;
    document.getElementById('calendarGrid').innerHTML = '<div style="text-align:center;color:#555;padding:10px;">加载中...</div>';
    document.getElementById('calMonthYear').innerText = '----年--月';

    // 清空时间列表
    document.getElementById('timeList').innerHTML = '<li class="empty-hint">加载中...</li>';
    document.getElementById('timeInfo').innerText = '';

    // 通知 C#
    try { window.external.SelectSwitch(switchId); } catch(e) {}
}

// ===== C# 同步转辙机下拉框选中值（不触发 onchange） =====
function setSelectedSwitch(switchId) {
    if (!switchId) return;
    currentSwitchId = switchId;
    var sel = document.getElementById('switchSelect');
    for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === switchId) {
            sel.selectedIndex = i;
            return;
        }
    }
}

// ===== 填充日期：C# 调用，datesJson 是日期字符串数组（降序） =====
function setDates(datesJson) {
    var dates;
    if (typeof datesJson === 'string') {
        try { dates = JSON.parse(datesJson); } catch(e) { dates = []; }
    } else {
        dates = datesJson;
    }

    allDates = dates || [];
    // 构建快速查找表
    allDatesSet = {};
    monthsWithData = {};
    yearsWithData = {};
    for (var i = 0; i < allDates.length; i++) {
        var d = allDates[i];
        allDatesSet[d] = true;
        // 解析年月
        var parts = d.split('-');
        var y = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10);
        yearsWithData[y] = true;
        if (!monthsWithData[y]) monthsWithData[y] = {};
        monthsWithData[y][m] = true;
    }

    if (allDates.length === 0) {
        calYear = 0;
        calMonth = 0;
        document.getElementById('calendarGrid').innerHTML = '<div style="text-align:center;color:#555;padding:10px;">暂无数据</div>';
        document.getElementById('calMonthYear').innerText = '----年--月';
        document.getElementById('timeList').innerHTML = '<li class="empty-hint">该转辙机无数据</li>';
        return;
    }

    // 默认显示最新日期的月份（dates[0] 是降序的最大日期）
    var latestDate = allDates[0];
    var parts = latestDate.split('-');
    calYear = parseInt(parts[0], 10);
    calMonth = parseInt(parts[1], 10);
    calView = 'day';

    renderCalendar();
}

// ===== C# 通知选中某个日期时调用，同步日历高亮 =====
function setSelectedDate(date) {
    currentDate = date;
    calView = 'day';
    if (date) {
        var parts = date.split('-');
        calYear = parseInt(parts[0], 10);
        calMonth = parseInt(parts[1], 10);
    }
    renderCalendar();
    document.getElementById('timeList').innerHTML = '<li class="empty-hint">加载中...</li>';
    document.getElementById('timeInfo').innerText = '';
}

// ===== 渲染日历（视图分发） =====
function renderCalendar() {
    if (calView === 'day')   { renderDayView(); }
    else if (calView === 'month') { renderMonthView(); }
    else if (calView === 'year')  { renderYearView(); }
}

// ===== D5: 接收日期角标数据 =====
function setAlarmBadges(alarmsJson) {
    var data;
    if (typeof alarmsJson === 'string') {
        try { data = JSON.parse(alarmsJson); } catch(e) { data = null; }
    } else {
        data = alarmsJson;
    }
    alarmBadges = data || {};
    // 重新渲染日历以显示角标
    if (allDates.length > 0) {
        renderCalendar();
    }
}
function renderDayView() {
    var grid = document.getElementById('calendarGrid');
    var header = document.getElementById('calMonthYear');
    var weekdays = document.getElementById('calWeekdays');

    if (calYear === 0 || calMonth === 0) {
        header.innerText = '----年--月';
        header.style.cursor = 'default';
        weekdays.style.display = 'block';
        grid.innerHTML = '<div style="text-align:center;color:#555;padding:10px;">暂无数据</div>';
        return;
    }

    header.innerText = calYear + '年' + calMonth + '月';
    header.style.cursor = 'pointer';
    weekdays.style.display = 'block';

    // 计算当月第一天是星期几（1=周一, 7=周日）
    var firstDay = new Date(calYear, calMonth - 1, 1);
    var startDayOfWeek = firstDay.getDay(); // 0=Sunday
    var startCol = (startDayOfWeek === 0) ? 6 : startDayOfWeek - 1;

    // 当月总天数
    var daysInMonth = new Date(calYear, calMonth, 0).getDate();

    // 先收集所有日期格到数组，再按行（7格/行）包装到 cal-row 容器中
    var cells = [];

    // 1号之前的空白格
    for (var i = 0; i < startCol; i++) {
        cells.push('<div class="cal-cell empty"></div>');
    }

    // 日期格（D5: 含报警角标）
    for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = calYear + '-' +
            (calMonth < 10 ? '0' : '') + calMonth + '-' +
            (d < 10 ? '0' : '') + d;

        var hasData = (allDatesSet[dateStr] === true);
        var isSelected = (dateStr === currentDate);
        var isToday = (dateStr === todayStr);

        var cls = 'cal-cell';
        if (hasData) cls += ' has-data';
        if (isSelected) cls += ' selected';
        if (isToday && !isSelected) cls += ' today';

        // D5: 角标 — 该日非正常计数
        var badgeHtml = '';
        var badge = alarmBadges[dateStr];
        if (badge) {
            var totalAbnormal = (badge['预警'] || 0) + (badge['报警'] || 0) + (badge['故障'] || 0);
            if (totalAbnormal > 0) {
                var badgeCls = (badge['故障'] || 0) > 0 ? 'cal-badge-fault' : 'cal-badge-warning';
                badgeHtml = '<span class="cal-badge ' + badgeCls + '">' + totalAbnormal + '</span>';
            }
        }

        var cellHtml = '<div class="' + cls + '"';
        if (hasData) {
            cellHtml += ' data-date="' + dateStr + '"';
        }
        cellHtml += '>' + d + badgeHtml + '</div>';
        cells.push(cellHtml);
    }

    // 填充剩余行（最多6行=42格）
    while (cells.length < 42) {
        cells.push('<div class="cal-cell empty"></div>');
    }

    // 按 7 格一行包装到 cal-row 容器中（IE8 兼容：clear:both 防止角标撑高导致的浮动错位）
    var html = '';
    for (var r = 0; r < cells.length; r += 7) {
        html += '<div class="cal-row">';
        for (var c = r; c < r + 7 && c < cells.length; c++) {
            html += cells[c];
        }
        html += '</div>';
    }

    grid.innerHTML = html;

    // 对有数据的日期绑定点击事件
    var cellDivs = grid.getElementsByTagName('div');
    for (var i = 0; i < cellDivs.length; i++) {
        var cell = cellDivs[i];
        if (cell.className.indexOf('has-data') >= 0) {
            cell.onclick = function() {
                onDateCellClick(this.getAttribute('data-date'));
            };
        }
    }
}
// ===== 日视图日期点击 =====
function onDateCellClick(date) {
    if (!date) return;
    currentDate = date;
    calView = 'day';
    renderCalendar();
    try { window.external.SelectDate(date); } catch(e) {}
}

// ===== 月视图：12月份面板（3列×4行） =====
function renderMonthView() {
    var grid = document.getElementById('calendarGrid');
    var header = document.getElementById('calMonthYear');
    var weekdays = document.getElementById('calWeekdays');

    header.innerText = calYear + '年';
    header.style.cursor = 'pointer';
    weekdays.style.display = 'none';

    var html = '';
    for (var m = 1; m <= 12; m++) {
        var hasData = (monthsWithData[calYear] && monthsWithData[calYear][m] === true);
        var isCurrent = (m === calMonth);

        var cls = 'cal-month-cell';
        if (hasData) cls += ' has-data';
        else cls += ' no-data';
        if (isCurrent) cls += ' selected';

        html += '<div class="' + cls + '"';
        if (hasData) {
            html += ' data-month="' + m + '"';
        }
        html += '>' + m + '月</div>';
    }

    grid.innerHTML = html;

    // 对有数据的月份绑定点击
    var cells = grid.getElementsByTagName('div');
    for (var i = 0; i < cells.length; i++) {
        var cell = cells[i];
        if (cell.className.indexOf('has-data') >= 0) {
            cell.onclick = function() {
                onMonthCellClick(parseInt(this.getAttribute('data-month'), 10));
            };
        }
    }
}

// ===== 月份点击：选中月份，回到日视图 =====
function onMonthCellClick(month) {
    calMonth = month;
    calView = 'day';
    renderCalendar();
}

// ===== 年视图：年份列表（3列×4行，一次显示12年） =====
function renderYearView() {
    var grid = document.getElementById('calendarGrid');
    var header = document.getElementById('calMonthYear');
    var weekdays = document.getElementById('calWeekdays');

    // 年份范围：以当前 calYear 为中心，显示12年
    var startYear = calYear - calYear % 12;
    var endYear = startYear + 11;

    header.innerText = startYear + ' - ' + endYear;
    header.style.cursor = 'default';
    weekdays.style.display = 'none';

    var html = '';
    for (var y = startYear; y <= endYear; y++) {
        var hasData = (yearsWithData[y] === true);
        var isCurrent = (y === calYear);

        var cls = 'cal-year-cell';
        if (hasData) cls += ' has-data';
        else cls += ' no-data';
        if (isCurrent) cls += ' selected';

        html += '<div class="' + cls + '"';
        if (hasData) {
            html += ' data-year="' + y + '"';
        }
        html += '>' + y + '</div>';
    }

    grid.innerHTML = html;

    // 对有数据的年份绑定点击
    var cells = grid.getElementsByTagName('div');
    for (var i = 0; i < cells.length; i++) {
        var cell = cells[i];
        if (cell.className.indexOf('has-data') >= 0) {
            cell.onclick = function() {
                onYearCellClick(parseInt(this.getAttribute('data-year'), 10));
            };
        }
    }
}

// ===== 年份点击：选中年份，进入月视图 =====
function onYearCellClick(year) {
    calYear = year;
    calView = 'month';
    renderCalendar();
}

// ===== 标题点击：逐级下钻 day→month→year =====
function onHeaderClick() {
    if (calYear === 0) return;
    if (calView === 'day') {
        calView = 'month';
    } else if (calView === 'month') {
        calView = 'year';
    } else if (calView === 'year') {
        // 年视图中再点击回到月视图
        calView = 'month';
    }
    renderCalendar();
}

// ===== 左右箭头导航（根据视图切换行为） =====
function calPrevMonth() {
    if (calYear === 0) return;
    if (calView === 'day') {
        // 日视图：上一月
        calMonth--;
        if (calMonth < 1) { calMonth = 12; calYear--; }
    } else if (calView === 'month') {
        // 月视图：上一年
        calYear--;
    } else if (calView === 'year') {
        // 年视图：上12年
        calYear -= 12;
    }
    renderCalendar();
}

function calNextMonth() {
    if (calYear === 0) return;
    if (calView === 'day') {
        // 日视图：下一月
        calMonth++;
        if (calMonth > 12) { calMonth = 1; calYear++; }
    } else if (calView === 'month') {
        // 月视图：下一年
        calYear++;
    } else if (calView === 'year') {
        // 年视图：下12年
        calYear += 12;
    }
    renderCalendar();
}

// ===== 时间列表更新（D5 扩展：支持 [{ts, level}, ...] 格式，兼容旧纯数字数组） =====
function setTimes(timesJson) {
    var timestamps;
    if (typeof timesJson === 'string') {
        try { timestamps = JSON.parse(timesJson); } catch(e) { timestamps = []; }
    } else {
        timestamps = timesJson;
    }

    var list = document.getElementById('timeList');
    list.innerHTML = '';

    if (!timestamps || timestamps.length === 0) {
        list.innerHTML = '<li class="empty-hint">该日无动作记录</li>';
        document.getElementById('timeInfo').innerText = '';
        return;
    }

    // 级别→CSS类名映射
    function getLevelClass(level) {
        if (level === '预警') return 'lvl-warning';
        if (level === '报警') return 'lvl-alarm';
        if (level === '故障') return 'lvl-fault';
        return 'lvl-normal';
    }

    for (var i = 0; i < timestamps.length; i++) {
        var item = timestamps[i];
        // 兼容旧格式：纯数字 → {ts: 数字, level: "正常"}
        var ts, level;
        if (typeof item === 'object') {
            ts = item.ts;
            level = item.level || '正常';
        } else {
            ts = item;
            level = '正常';
        }

        var li = document.createElement('li');
        var timeStr = formatTimestamp(ts);
        if (level !== '正常') {
            timeStr = timeStr + ' ' + level;
        }
        li.innerText = timeStr;
        li.className = getLevelClass(level);
        li.setAttribute('data-ts', ts);
        li.setAttribute('data-level', level);
        li.onclick = function() {
            selectTime(this.getAttribute('data-ts'));
        };
        list.appendChild(li);
    }

    document.getElementById('timeInfo').innerText = '共 ' + timestamps.length + ' 条动作记录';
}

// 更新 setSelectedTime 以支持级别着色保持
function setSelectedTime(timestamp) {
    currentTimestamp = timestamp;
    var items = document.querySelectorAll('#timeList li');
    for (var i = 0; i < items.length; i++) {
        var ts = items[i].getAttribute('data-ts');
        if (ts === timestamp) {
            // 保持级别 CSS 类，加 active
            var level = items[i].getAttribute('data-level') || '正常';
            items[i].className = (level === '正常' ? 'lvl-normal' : ('lvl-' + (level === '预警' ? 'warning' : level === '报警' ? 'alarm' : 'fault'))) + ' active';
        } else {
            var level2 = items[i].getAttribute('data-level') || '正常';
            if (level2 === '预警') items[i].className = 'lvl-warning';
            else if (level2 === '报警') items[i].className = 'lvl-alarm';
            else if (level2 === '故障') items[i].className = 'lvl-fault';
            else items[i].className = 'lvl-normal';
        }
    }
}

// ===== 时间点击 =====
function selectTime(timestamp) {
    setSelectedTime(timestamp);
    try { window.external.SelectTime(timestamp); } catch(e) {}
}

// ===== 键盘上下键导航时间点 =====
document.onkeydown = function(e) {
    e = e || window.event;
    var key = e.keyCode || e.which;
    if (key === 38 || key === 40) {
        if (!currentTimestamp) return true;

        var items = document.querySelectorAll('#timeList li');
        if (!items || items.length === 0) return true;

        // 查找当前选中项索引
        var currentIndex = -1;
        for (var i = 0; i < items.length; i++) {
            if (items[i].getAttribute('data-ts') === String(currentTimestamp)) {
                currentIndex = i;
                break;
            }
        }
        if (currentIndex < 0) return true;

        var newIndex = currentIndex;
        if (key === 38) newIndex = currentIndex - 1; // 上
        else if (key === 40) newIndex = currentIndex + 1; // 下

        if (newIndex >= 0 && newIndex < items.length) {
            var ts = items[newIndex].getAttribute('data-ts');
            if (ts) {
                selectTime(ts);
                // 智能滚动：仅当选中项超出可视区域时才滚动容器
                var container = document.getElementById('timeContainer');
                var itemTop = items[newIndex].offsetTop;
                var itemBottom = itemTop + items[newIndex].offsetHeight;
                var viewTop = container.scrollTop;
                var viewBottom = viewTop + container.clientHeight;
                if (itemTop < viewTop) {
                    container.scrollTop = itemTop;
                } else if (itemBottom > viewBottom) {
                    container.scrollTop = itemBottom - container.clientHeight;
                }
            }
        }

        if (e.preventDefault) e.preventDefault();
        e.returnValue = false;
        return false;
    }
    return true;
};

// ===== 格式化 Unix 时间戳为 HH:mm:ss =====
function formatTimestamp(ts) {
    var d = new Date(parseInt(ts) * 1000);
    var h = d.getHours();
    var m = d.getMinutes();
    var s = d.getSeconds();
    return (h < 10 ? '0' : '') + h + ':' +
           (m < 10 ? '0' : '') + m + ':' +
           (s < 10 ? '0' : '') + s;
}

// ===== 页面加载完成后初始化 =====
function onSidebarReady() {

// ===== N01-4 站点状态指示灯（绿/红/灰） =====
// C# 调用：updateSiteStatus("{ \"SSB\": \"online\", \"DHD\": \"offline\" }")
function updateSiteStatuses(statusesJson) {
    var statuses;
    if (typeof statusesJson === 'string') {
        try { statuses = JSON.parse(statusesJson); } catch(e) { statuses = {}; }
    } else {
        statuses = statusesJson;
    }
    if (!statuses) return;

    // 更新下拉框选项中的状态符号
    var sel = document.getElementById('siteSelect');
    for (var i = 0; i < sel.options.length; i++) {
        var opt = sel.options[i];
        var siteId = opt.value;
        var st = statuses[siteId] || 'unknown';
        var prefix = (st === 'online') ? '● ' : (st === 'offline') ? '○ ' : '◌ ';
        // 去除旧前缀后添加新前缀
        var name = opt.getAttribute('data-name') || opt.innerText;
        // 保存原始名称（不含状态符号）
        if (!opt.getAttribute('data-name')) {
            opt.setAttribute('data-name', name);
        }
        var cleanName = opt.getAttribute('data-name');
        opt.innerText = prefix + cleanName;
    }

    // 更新当前选中站点的状态灯
    updateSelectedSiteDot(statuses);
}

// 更新站点灯
function updateSelectedSiteDot(statuses) {
    var sel = document.getElementById('siteSelect');
    var dot = document.getElementById('siteStatusDot');
    var btn = document.getElementById('catchupBtn');
    var info = document.getElementById('siteInfo');

    var siteId = sel.value;
    var st = statuses ? (statuses[siteId] || 'unknown') : 'unknown';

    dot.className = 'site-status-dot ' + st;

    // 离线时显示补拉按钮，在线/未知时隐藏
    if (st === 'offline') {
        btn.disabled = false;
        btn.style.display = '';
    } else {
        btn.disabled = true;
        btn.style.display = 'none';
    }
}

// ===== 补拉按钮 =====
function onCatchupClick() {
    var sel = document.getElementById('siteSelect');
    var siteId = sel.value;
    if (!siteId) return;

    var btn = document.getElementById('catchupBtn');
    btn.disabled = true;
    btn.innerText = '...';

    try { window.external.CatchupData(siteId); } catch(e) {}
}

// C# 调用：补拉完成后恢复按钮
function onCatchupComplete(siteId) {
    var sel = document.getElementById('siteSelect');
    if (sel.value === siteId) {
        var btn = document.getElementById('catchupBtn');
        btn.innerText = '补拉';
        btn.disabled = true;
        btn.style.display = 'none';
    }
}

// C# 调用：更新站点信息行（IP + 端口）
function setSiteInfo(text) {
    document.getElementById('siteInfo').innerText = text || '';
}

// ===== 站点下拉框（含状态符号） =====
var _siteStatuses = {};  // 内存状态缓存

function populateSites(sites, selectedSiteId) {
    var sel = document.getElementById('siteSelect');
    sel.innerHTML = '';
    if (!sites || sites.length === 0) {
        sel.style.display = 'none';
        return;
    }
    sel.style.display = '';

    // 存储站点数据供 onSiteChange 使用
    try { sel.setAttribute('data-sites', JSON.stringify(sites)); } catch(e) {}

    for (var i = 0; i < sites.length; i++) {
        var sid = sites[i].Id || sites[i].id;
        var name = sites[i].Name || sites[i].name;
        var st = _siteStatuses[sid] || 'unknown';
        var prefix = (st === 'online') ? '● ' : (st === 'offline') ? '○ ' : '◌ ';

        var opt = document.createElement('option');
        opt.value = sid;
        opt.setAttribute('data-name', name);
        opt.innerText = prefix + name;
        if (sid === selectedSiteId) {
            opt.selected = true;
        }
        sel.appendChild(opt);
    }

    // 更新站点信息行
    updateSiteInfo(sites, selectedSiteId);
    updateSelectedSiteDot(_siteStatuses);

    // IE8: innerHTML 可能清除 onchange 绑定，重新挂载
    sel.onchange = onSiteChange;
}

// 更新当前选中站点的 IP:Port 信息行
function updateSiteInfo(sites, selSiteId) {
    if (!sites) return;
    for (var i = 0; i < sites.length; i++) {
        var sid = sites[i].Id || sites[i].id;
        if (sid === selSiteId) {
            var ip = sites[i].Ip || '';
            var port = sites[i].Port || 0;
            if (ip && port > 0) {
                setSiteInfo(ip + ':' + port);
            } else {
                setSiteInfo('');
            }
            return;
        }
    }
    setSiteInfo('');
}
    var sites = {{SITES_JSON}};

    populateSites(sites, selSiteId);

}
