<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=8">
<style>
* { margin: 0; padding: 0; }
body {
    background: #1a1a2e;
    color: #e0e0e0;
    font: 12px SimSun, sans-serif;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
}
.section { padding: 8px 10px; }
.section-title {
    font-size: 11px;
    color: #666;
    padding: 6px 10px 4px;
    border-bottom: 1px solid #2a2a4e;
    margin-bottom: 4px;
}

/* 转辙机列表 */
.switch-list { list-style: none; }
.switch-list li {
    padding: 6px 12px;
    cursor: pointer;
    color: #aaa;
    border-left: 2px solid transparent;
}
.switch-list li:hover { background: #252545; color: #fff; }
.switch-list li.active {
    background: #2a2a5e;
    color: #fff;
    border-left: 2px solid #4488FF;
}

/* ===== 日历式日期选择器 ===== */
.calendar-container {
    margin-top: 2px;
}

/* 月份导航栏 */
.cal-header {
    text-align: center;
    padding: 3px 0 6px 0;
    position: relative;
    height: 20px;
    line-height: 20px;
}
.cal-nav {
    position: absolute;
    top: 0;
    width: 22px;
    height: 20px;
    background: #333355;
    color: #ccc;
    border: 1px solid #444466;
    font: 11px SimSun;
    cursor: pointer;
    text-align: center;
    line-height: 18px;
    padding: 0;
}
.cal-nav:hover { background: #444477; color: #fff; }
#calPrev { left: 0; }
#calNext { right: 0; }
.cal-month-year {
    color: #ddd;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    padding: 2px 6px;
}
.cal-month-year:hover {
    background: #333355;
}

/* 星期标题行 */
.cal-weekdays {
    overflow: hidden;
    border-bottom: 1px solid #2a2a4e;
    padding-bottom: 3px;
    margin-bottom: 3px;
}
.cal-weekdays span {
    float: left;
    width: 14.28%;
    text-align: center;
    font-size: 10px;
    color: #666;
    padding: 2px 0;
}

/* 日期网格 */
.cal-grid {
    overflow: hidden;
}
.cal-cell {
    float: left;
    width: 14.28%;
    text-align: center;
    padding: 4px 0;
    font-size: 11px;
    cursor: default;
    color: #444;
    font-family: Consolas, monospace;
}
.cal-cell.has-data {
    color: #ddd;
    cursor: pointer;
}
.cal-cell.has-data:hover {
    background: #333388;
    color: #fff;
}
.cal-cell.selected {
    background: #3366CC;
    color: #fff;
    font-weight: bold;
}
.cal-cell.today {
    color: #FFAA00;
}
.cal-cell.today.selected {
    color: #fff;
}

/* 月份选择面板 — 3列×4行 */
.cal-month-cell {
    float: left;
    width: 33.33%;
    text-align: center;
    padding: 8px 0;
    font-size: 12px;
    cursor: pointer;
    color: #ddd;
}
.cal-month-cell:hover {
    background: #333388;
    color: #fff;
}
.cal-month-cell.selected {
    background: #3366CC;
    color: #fff;
    font-weight: bold;
}
.cal-month-cell.no-data {
    color: #444;
    cursor: default;
}
.cal-month-cell.no-data:hover {
    background: transparent;
    color: #444;
}

/* 年份选择面板 — 3列×4行 */
.cal-year-cell {
    float: left;
    width: 33.33%;
    text-align: center;
    padding: 8px 0;
    font-size: 12px;
    cursor: pointer;
    color: #ddd;
}
.cal-year-cell:hover {
    background: #333388;
    color: #fff;
}
.cal-year-cell.selected {
    background: #3366CC;
    color: #fff;
    font-weight: bold;
}
.cal-year-cell.no-data {
    color: #444;
    cursor: default;
}
.cal-year-cell.no-data:hover {
    background: transparent;
    color: #444;
}

/* 时间列表 */
.time-container { overflow-y: auto; }
.time-list { list-style: none; }
.time-list li {
    padding: 5px 12px;
    cursor: pointer;
    color: #aaa;
    font-family: Consolas, monospace;
    font-size: 13px;
}
.time-list li:hover { background: #252545; color: #fff; }
.time-list li.active {
    background: #2a2a5e;
    color: #FFAA00;
    font-weight: bold;
}

/* 空状态提示 */
.empty-hint {
    color: #555;
    text-align: center;
    padding: 20px 10px;
    font-size: 11px;
}

/* 信息提示 */
.info-text {
    color: #777;
    font-size: 10px;
    padding: 2px 8px;
    margin-top: 2px;
}

/* 分割线 */
.divider { border: none; border-top: 1px solid #2a2a4e; margin: 4px 0; }
</style>
</head>
<body>

<div class="section">
    <div class="section-title">转辙机组</div>
    <ul class="switch-list" id="switchList"></ul>
</div>

<hr class="divider">

<div class="section">
    <div class="section-title">日期</div>
    <div class="calendar-container" id="calendarContainer">
        <div class="cal-header">
            <button class="cal-nav" id="calPrev" onclick="calPrevMonth()">◀</button>
            <span class="cal-month-year" id="calMonthYear" onclick="onHeaderClick()" title="点击选择月份/年份">----年--月</span>
            <button class="cal-nav" id="calNext" onclick="calNextMonth()">▶</button>
        </div>
        <div class="cal-weekdays" id="calWeekdays">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
        </div>
        <div class="cal-grid" id="calendarGrid">
            <div style="text-align:center;color:#555;padding:10px;">请选择转辙机</div>
        </div>
    </div>
    <div class="info-text" id="dateInfo"></div>
</div>

<hr class="divider">

<div class="section">
    <div class="section-title">动作时间</div>
    <div class="time-container" id="timeContainer">
        <ul class="time-list" id="timeList">
            <li class="empty-hint">请选择日期</li>
        </ul>
    </div>
    <div class="info-text" id="timeInfo"></div>
</div>

<script>
// ===== IE7/IE8 JSON 兼容层 =====
if (typeof JSON === 'undefined' || typeof JSON.parse === 'undefined') {
    window.JSON = { parse: function(t) { return (new Function('return ' + t))(); } };
}

var currentSwitchId = null;
var currentDate = null;
var currentTimestamp = null;

// ===== 日历状态 =====
var allDates = [];         // 全部有数据的日期字符串（降序）
var allDatesSet = {};      // 快速查找：date → true
var monthsWithData = {};   // 按年查找有数据的月份：{"2026": {1:true, 2:true, ...}}
var yearsWithData = {};   // 有数据的年份：{"2026": true, "2025": true}
var calView = 'day';       // 当前视图：'day' | 'month' | 'year'
var calYear = 0;           // 当前显示的年份
var calMonth = 0;          // 当前显示的月份
var todayStr = '';         // 今天的日期字符串 "yyyy-MM-dd"

// 初始化 todayStr
(function() {
    var now = new Date();
    var y = now.getFullYear();
    var m = now.getMonth() + 1;
    var d = now.getDate();
    todayStr = y + '-' + (m < 10 ? '0' : '') + m + '-' + (d < 10 ? '0' : '') + d;
})();

// ===== 初始化：加载转辙机列表 =====
function initSwitchGroups(groupsJson) {
    var groups;
    if (typeof groupsJson === 'string') {
        try { groups = JSON.parse(groupsJson); } catch(e) { groups = []; }
    } else {
        groups = groupsJson;
    }

    var list = document.getElementById('switchList');
    list.innerHTML = '';
    for (var i = 0; i < groups.length; i++) {
        var li = document.createElement('li');
        li.innerText = groups[i].label || groups[i].Id || groups[i].id;
        li.setAttribute('data-id', groups[i].Id || groups[i].id);
        li.onclick = function() {
            selectSwitch(this.getAttribute('data-id'));
        };
        list.appendChild(li);
    }
}

// ===== 转辙机选择 =====
function selectSwitch(switchId) {
    currentSwitchId = switchId;
    currentDate = null;
    currentTimestamp = null;

    // 高亮
    var items = document.querySelectorAll('#switchList li');
    for (var i = 0; i < items.length; i++) {
        var id = items[i].getAttribute('data-id');
        if (id === switchId) {
            items[i].className = 'active';
        } else {
            items[i].className = '';
        }
    }

    // 重置日历为加载状态
    allDates = [];
    allDatesSet = {};
    monthsWithData = {};
    yearsWithData = {};
    calView = 'day';
    calYear = 0;
    calMonth = 0;
    document.getElementById('calendarGrid').innerHTML = '<div style="text-align:center;color:#555;padding:10px;">加载中...</div>';
    document.getElementById('calMonthYear').innerText = '----年--月';

    // 清空时间列表
    document.getElementById('timeList').innerHTML = '<li class="empty-hint">加载中...</li>';
    document.getElementById('dateInfo').innerText = '';
    document.getElementById('timeInfo').innerText = '';

    // 通知 C#
    try { window.external.SelectSwitch(switchId); } catch(e) {}
}

// ===== 填充日期：C# 调用，datesJson 是日期字符串数组（降序） =====
function setDates(datesJson) {
    var dates;
    if (typeof datesJson === 'string') {
        try { dates = JSON.parse(datesJson); } catch(e) { dates = []; }
    } else {
        dates = datesJson;
    }

    allDates = dates || [];
    // 构建快速查找表
    allDatesSet = {};
    monthsWithData = {};
    yearsWithData = {};
    for (var i = 0; i < allDates.length; i++) {
        var d = allDates[i];
        allDatesSet[d] = true;
        // 解析年月
        var parts = d.split('-');
        var y = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10);
        yearsWithData[y] = true;
        if (!monthsWithData[y]) monthsWithData[y] = {};
        monthsWithData[y][m] = true;
    }

    if (allDates.length === 0) {
        calYear = 0;
        calMonth = 0;
        document.getElementById('calendarGrid').innerHTML = '<div style="text-align:center;color:#555;padding:10px;">暂无数据</div>';
        document.getElementById('calMonthYear').innerText = '----年--月';
        document.getElementById('dateInfo').innerText = '';
        document.getElementById('timeList').innerHTML = '<li class="empty-hint">该转辙机无数据</li>';
        return;
    }

    // 默认显示最新日期的月份（dates[0] 是降序的最大日期）
    var latestDate = allDates[0];
    var parts = latestDate.split('-');
    calYear = parseInt(parts[0], 10);
    calMonth = parseInt(parts[1], 10);
    calView = 'day';

    renderCalendar();
    document.getElementById('dateInfo').innerText = '共 ' + allDates.length + ' 天数据';
}

// ===== C# 通知选中某个日期时调用，同步日历高亮 =====
function setSelectedDate(date) {
    currentDate = date;
    calView = 'day';
    if (date) {
        var parts = date.split('-');
        calYear = parseInt(parts[0], 10);
        calMonth = parseInt(parts[1], 10);
    }
    renderCalendar();
    document.getElementById('timeList').innerHTML = '<li class="empty-hint">加载中...</li>';
    document.getElementById('timeInfo').innerText = '';
}

// ===== 渲染日历（视图分发） =====
function renderCalendar() {
    if (calView === 'day')   { renderDayView(); }
    else if (calView === 'month') { renderMonthView(); }
    else if (calView === 'year')  { renderYearView(); }
}

// ===== 日视图：当月日期网格 =====
function renderDayView() {
    var grid = document.getElementById('calendarGrid');
    var header = document.getElementById('calMonthYear');
    var weekdays = document.getElementById('calWeekdays');

    if (calYear === 0 || calMonth === 0) {
        header.innerText = '----年--月';
        header.style.cursor = 'default';
        weekdays.style.display = 'block';
        grid.innerHTML = '<div style="text-align:center;color:#555;padding:10px;">暂无数据</div>';
        return;
    }

    header.innerText = calYear + '年' + calMonth + '月';
    header.style.cursor = 'pointer';
    weekdays.style.display = 'block';

    // 计算当月第一天是星期几（1=周一, 7=周日）
    var firstDay = new Date(calYear, calMonth - 1, 1);
    var startDayOfWeek = firstDay.getDay(); // 0=Sunday
    var startCol = (startDayOfWeek === 0) ? 6 : startDayOfWeek - 1;

    // 当月总天数
    var daysInMonth = new Date(calYear, calMonth, 0).getDate();

    var html = '';
    var cellCount = 0;

    // 1号之前的空白格
    for (var i = 0; i < startCol; i++) {
        html += '<div class="cal-cell empty"></div>';
        cellCount++;
    }

    // 日期格
    for (var d = 1; d <= daysInMonth; d++) {
        var dateStr = calYear + '-' +
            (calMonth < 10 ? '0' : '') + calMonth + '-' +
            (d < 10 ? '0' : '') + d;

        var hasData = (allDatesSet[dateStr] === true);
        var isSelected = (dateStr === currentDate);
        var isToday = (dateStr === todayStr);

        var cls = 'cal-cell';
        if (hasData) cls += ' has-data';
        if (isSelected) cls += ' selected';
        if (isToday && !isSelected) cls += ' today';

        html += '<div class="' + cls + '"';
        if (hasData) {
            html += ' data-date="' + dateStr + '"';
        }
        html += '>' + d + '</div>';
        cellCount++;
    }

    // 填充剩余行（最多6行=42格）
    while (cellCount < 42) {
        html += '<div class="cal-cell empty"></div>';
        cellCount++;
    }

    grid.innerHTML = html;

    // 对有数据的日期绑定点击事件
    var cells = grid.getElementsByTagName('div');
    for (var i = 0; i < cells.length; i++) {
        var cell = cells[i];
        if (cell.className.indexOf('has-data') >= 0) {
            cell.onclick = function() {
                onDateCellClick(this.getAttribute('data-date'));
            };
        }
    }
}

// ===== 日视图日期点击 =====
function onDateCellClick(date) {
    if (!date) return;
    currentDate = date;
    calView = 'day';
    renderCalendar();
    try { window.external.SelectDate(date); } catch(e) {}
}

// ===== 月视图：12月份面板（3列×4行） =====
function renderMonthView() {
    var grid = document.getElementById('calendarGrid');
    var header = document.getElementById('calMonthYear');
    var weekdays = document.getElementById('calWeekdays');

    header.innerText = calYear + '年';
    header.style.cursor = 'pointer';
    weekdays.style.display = 'none';

    var html = '';
    for (var m = 1; m <= 12; m++) {
        var hasData = (monthsWithData[calYear] && monthsWithData[calYear][m] === true);
        var isCurrent = (m === calMonth);

        var cls = 'cal-month-cell';
        if (hasData) cls += ' has-data';
        else cls += ' no-data';
        if (isCurrent) cls += ' selected';

        html += '<div class="' + cls + '"';
        if (hasData) {
            html += ' data-month="' + m + '"';
        }
        html += '>' + m + '月</div>';
    }

    grid.innerHTML = html;

    // 对有数据的月份绑定点击
    var cells = grid.getElementsByTagName('div');
    for (var i = 0; i < cells.length; i++) {
        var cell = cells[i];
        if (cell.className.indexOf('has-data') >= 0) {
            cell.onclick = function() {
                onMonthCellClick(parseInt(this.getAttribute('data-month'), 10));
            };
        }
    }
}

// ===== 月份点击：选中月份，回到日视图 =====
function onMonthCellClick(month) {
    calMonth = month;
    calView = 'day';
    renderCalendar();
}

// ===== 年视图：年份列表（3列×4行，一次显示12年） =====
function renderYearView() {
    var grid = document.getElementById('calendarGrid');
    var header = document.getElementById('calMonthYear');
    var weekdays = document.getElementById('calWeekdays');

    // 年份范围：以当前 calYear 为中心，显示12年
    var startYear = calYear - calYear % 12;
    var endYear = startYear + 11;

    header.innerText = startYear + ' - ' + endYear;
    header.style.cursor = 'default';
    weekdays.style.display = 'none';

    var html = '';
    for (var y = startYear; y <= endYear; y++) {
        var hasData = (yearsWithData[y] === true);
        var isCurrent = (y === calYear);

        var cls = 'cal-year-cell';
        if (hasData) cls += ' has-data';
        else cls += ' no-data';
        if (isCurrent) cls += ' selected';

        html += '<div class="' + cls + '"';
        if (hasData) {
            html += ' data-year="' + y + '"';
        }
        html += '>' + y + '</div>';
    }

    grid.innerHTML = html;

    // 对有数据的年份绑定点击
    var cells = grid.getElementsByTagName('div');
    for (var i = 0; i < cells.length; i++) {
        var cell = cells[i];
        if (cell.className.indexOf('has-data') >= 0) {
            cell.onclick = function() {
                onYearCellClick(parseInt(this.getAttribute('data-year'), 10));
            };
        }
    }
}

// ===== 年份点击：选中年份，进入月视图 =====
function onYearCellClick(year) {
    calYear = year;
    calView = 'month';
    renderCalendar();
}

// ===== 标题点击：逐级下钻 day→month→year =====
function onHeaderClick() {
    if (calYear === 0) return;
    if (calView === 'day') {
        calView = 'month';
    } else if (calView === 'month') {
        calView = 'year';
    } else if (calView === 'year') {
        // 年视图中再点击回到月视图
        calView = 'month';
    }
    renderCalendar();
}

// ===== 左右箭头导航（根据视图切换行为） =====
function calPrevMonth() {
    if (calYear === 0) return;
    if (calView === 'day') {
        // 日视图：上一月
        calMonth--;
        if (calMonth < 1) { calMonth = 12; calYear--; }
    } else if (calView === 'month') {
        // 月视图：上一年
        calYear--;
    } else if (calView === 'year') {
        // 年视图：上12年
        calYear -= 12;
    }
    renderCalendar();
}

function calNextMonth() {
    if (calYear === 0) return;
    if (calView === 'day') {
        // 日视图：下一月
        calMonth++;
        if (calMonth > 12) { calMonth = 1; calYear++; }
    } else if (calView === 'month') {
        // 月视图：下一年
        calYear++;
    } else if (calView === 'year') {
        // 年视图：下12年
        calYear += 12;
    }
    renderCalendar();
}

// ===== 时间列表更新 =====
function setTimes(timesJson) {
    var timestamps;
    if (typeof timesJson === 'string') {
        try { timestamps = JSON.parse(timesJson); } catch(e) { timestamps = []; }
    } else {
        timestamps = timesJson;
    }

    var list = document.getElementById('timeList');
    list.innerHTML = '';

    if (!timestamps || timestamps.length === 0) {
        list.innerHTML = '<li class="empty-hint">该日无动作记录</li>';
        document.getElementById('timeInfo').innerText = '';
        return;
    }

    for (var i = 0; i < timestamps.length; i++) {
        var ts = timestamps[i];
        var li = document.createElement('li');
        li.innerText = formatTimestamp(ts);
        li.setAttribute('data-ts', ts);
        li.onclick = function() {
            selectTime(this.getAttribute('data-ts'));
        };
        list.appendChild(li);
    }

    // 自适应时间列表高度
    var container = document.getElementById('timeContainer');
    var bodyHeight = document.body.clientHeight || document.documentElement.clientHeight;
    var switchSection = document.getElementById('switchList').parentNode;
    var dateSection = document.getElementById('calendarContainer').parentNode;
    var topHeight = 0;
    if (switchSection) topHeight += switchSection.offsetHeight;
    if (dateSection) topHeight += dateSection.offsetHeight;
    var dividers = document.querySelectorAll('.divider');
    for (var d = 0; d < dividers.length; d++) {
        topHeight += dividers[d].offsetHeight;
    }
    var reservedBottom = 20;
    if (bodyHeight > topHeight + reservedBottom) {
        container.style.maxHeight = (bodyHeight - topHeight - reservedBottom) + 'px';
        container.style.overflowY = 'auto';
    }

    document.getElementById('timeInfo').innerText = '共 ' + timestamps.length + ' 条动作记录';
}

function setSelectedTime(timestamp) {
    currentTimestamp = timestamp;
    var items = document.querySelectorAll('#timeList li');
    for (var i = 0; i < items.length; i++) {
        if (items[i].getAttribute('data-ts') === timestamp) {
            items[i].className = 'active';
        } else {
            items[i].className = '';
        }
    }
}

// ===== 时间点击 =====
function selectTime(timestamp) {
    setSelectedTime(timestamp);
    try { window.external.SelectTime(timestamp); } catch(e) {}
}

// ===== 格式化 Unix 时间戳为 HH:mm:ss =====
function formatTimestamp(ts) {
    var d = new Date(parseInt(ts) * 1000);
    var h = d.getHours();
    var m = d.getMinutes();
    var s = d.getSeconds();
    return (h < 10 ? '0' : '') + h + ':' +
           (m < 10 ? '0' : '') + m + ':' +
           (s < 10 ? '0' : '') + s;
}

// ===== 页面加载完成后初始化 =====
function onSidebarReady() {
    var groups = {{CONFIG_JSON}};
    initSwitchGroups(groups);
}
</script>
<script>onSidebarReady();</script>
</body>
</html>
