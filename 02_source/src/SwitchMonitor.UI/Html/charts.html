<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=8">
<style>
* { margin: 0; padding: 0; }
html, body {
    width: 100%;
    height: 100%;
    background: #3c3c3c;
    color: #dddddd;
    font: 12px SimSun, sans-serif;
    overflow: hidden;
}

/* 工具栏（单行紧凑布局，短标签避免被浮动按钮遮挡） */
.toolbar {
    background: #2d2d2d;
    padding: 4px 8px;
    border-bottom: 1px solid #555555;
    height: 28px;
    line-height: 28px;
    position: relative;
    z-index: 10;
}
.toolbar label {
    margin-right: 8px;
    cursor: pointer;
    color: #cccccc;
    font-size: 12px;
}
.toolbar input[type="checkbox"] { margin-right: 2px; vertical-align: middle; }
.toolbar button {
    float: right;
    margin-left: 5px;
    padding: 2px 7px;
    background: #444466;
    color: #dddddd;
    border: 1px solid #666688;
    font: 12px SimSun;
    cursor: pointer;
}
.toolbar button:hover { background: #555588; }
.toolbar button:disabled { color: #666666; cursor: default; }

/* 图表网格 — 2×2 布局：上排当前事件，下排上一次事件 */
.chart-grid {
    position: absolute;
    top: 36px;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
}
.chart-row {
    width: 100%;
    height: 50%;
    overflow: hidden;
}
.chart-cell {
    width: 50%;
    height: 100%;
    float: left;
    overflow: hidden;
}
.chart-inner {
    width: 100%;
    height: 100%;
    position: relative;
}

/* 自定义鼠标跟随提示框 */
.custom-tooltip {
    position: absolute;
    pointer-events: none;
    z-index: 1000;
    background: #1a1a30;
    border: 1px solid #8888CC;
    padding: 8px 12px;
    font: 12px SimSun, sans-serif;
    color: #DDDDDD;
    display: none;
    white-space: nowrap;
    line-height: 1.6;
}

/* 诊断结论条 */
.diag-bar {
    position: absolute;
    top: 36px;
    left: 0;
    right: 0;
    height: 28px;
    line-height: 28px;
    padding: 0 12px;
    font-size: 12px;
    z-index: 10;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}
.diag-bar-normal { background: #2a3a2a; color: #55FF55; }
.diag-bar-warning { background: #4a4a20; color: #FFD54F; }
.diag-bar-alarm { background: #4a3020; color: #FF9800; }
.diag-bar-fault { background: #4a2020; color: #FF4444; }
.diag-bar-unknown { background: #2a2a2a; color: #888888; }
.diag-dot {
    display: inline;
    margin-right: 6px;
    font-size: 14px;
    vertical-align: middle;
    position: relative;
    top: -1px;
}
.diag-dot-normal { color: #55FF55; }
.diag-dot-unknown { color: #888888; }

/* 诊断条出现后，图表网格往下移 */
.chart-grid {
    position: absolute;
    top: 64px;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
}

/* 空状态 */
.empty-state {
    position: absolute;
    top: 50%;
    left: 50%;
    margin-left: -150px;
    margin-top: -30px;
    width: 300px;
    text-align: center;
    z-index: 5;
}
.empty-state .main-msg {
    color: #FFAA00;
    font-size: 16px;
    font-weight: bold;
}
.empty-state .sub-msg {
    color: #888888;
    font-size: 13px;
    margin-top: 6px;
}
.empty-state .err-msg {
    color: #FF4444;
    font-size: 12px;
    margin-top: 8px;
    padding: 4px 8px;
    background: #330000;
    border: 1px solid #660000;
}
</style>
</head>
<body>

<!-- 诊断标记 -->
<div style="background:#555;color:#999;font-size:10px;padding:1px 6px;position:absolute;bottom:0;left:0;z-index:9999;opacity:0.6;" id="_renderTest">RENDER</div>

<div class="toolbar" id="toolbar">
    <button id="btnResetZoom" disabled onclick="resetAllZoom()">重置缩放</button>
    <label><input type="checkbox" id="chkCurrentA" checked onchange="toggleCheckbox()">A相</label>
    <label><input type="checkbox" id="chkCurrentB" checked onchange="toggleCheckbox()">B相</label>
    <label><input type="checkbox" id="chkCurrentC" checked onchange="toggleCheckbox()">C相</label>
    <label><input type="checkbox" id="chkPower" checked onchange="toggleCheckbox()">功率</label>
    <label style="margin-left:12px;"><input type="checkbox" id="chkThreshold" checked onchange="toggleCheckbox()">阈值</label>
    <label style="margin-left:12px;"><input type="checkbox" id="chkReference" onchange="toggleReference()">参考</label>
    <label style="margin-left:2px;" title="勾选=中位标准曲线+人工参考曲线融合；不勾选=纯人工参考曲线"><input type="checkbox" id="chkFusion" checked onchange="toggleFusion()">融合</label>
    <select id="selFusionWeight" onchange="onFusionWeightChange()" onkeyup="onFusionWeightChange()"
            style="vertical-align:middle;margin-left:4px;font-size:11px;width:auto;"
            title="融合权重：0%=纯人工参考曲线，100%=纯中位标准曲线（由历史数据生成）">
      <option value="0">权重0%</option>
      <option value="10">10%</option>
      <option value="20">20%</option>
      <option value="30">30%</option>
      <option value="40">40%</option>
      <option value="50">50%</option>
      <option value="60">60%</option>
      <option value="70">70%</option>
      <option value="80">80%</option>
      <option value="90">90%</option>
      <option value="100" selected>100%</option>
    </select>
    <label style="margin-left:4px;"><input type="checkbox" id="chkBaseline" onchange="toggleBaseline()">P基线</label>
    <label style="margin-left:4px;"><input type="checkbox" id="chkCurrentBaseline" onchange="toggleCurrentBaseline()">I基线</label>
    <button id="btnCancelReference" disabled onclick="cancelReferenceCurve()" style="margin-left:4px;">取消设定</button>
    <button id="btnSetReference" disabled onclick="setReferenceCurve()">设定参考</button>
    <span id="refCurveStatus" style="display:none;margin-left:6px;font-size:12px;vertical-align:middle;"></span>
</div>

<div class="diag-bar diag-bar-unknown" id="diagBar" title=""><span class="diag-dot diag-dot-unknown">&#9679;</span>未诊断</div>

<div class="chart-grid" id="chartGrid">
    <div class="chart-row">
        <div class="chart-cell">
            <div class="chart-inner" id="chart1"><div class="custom-tooltip" id="tip_chart1"></div></div>
        </div>
        <div class="chart-cell">
            <div class="chart-inner" id="chart2"><div class="custom-tooltip" id="tip_chart2"></div></div>
        </div>
    </div>
    <div class="chart-row">
        <div class="chart-cell">
            <div class="chart-inner" id="chart3"><div class="custom-tooltip" id="tip_chart3"></div></div>
        </div>
        <div class="chart-cell">
            <div class="chart-inner" id="chart4"><div class="custom-tooltip" id="tip_chart4"></div></div>
        </div>
    </div>
</div>

<div class="empty-state" id="emptyState">
    <div class="main-msg">请选择转辙机查看曲线</div>
    <div class="sub-msg">★ Build 2026-07-06-v24 ★ | <span id="diagStatus">等待数据</span></div>
    <div class="err-msg" id="errMsg" style="display:none;"></div>
</div>

<script>
// ===== IE8 console polyfill（WebBrowser ScriptErrorsSuppressed=true 环境下需此项） =====
window.console = window.console || { log: function(){}, warn: function(){}, error: function(){} };

// ===== 显示诊断错误 =====
function showError(msg) {
    var el = document.getElementById('errMsg');
    if (el) {
        el.style.display = 'block';
        el.innerText = 'JS Error: ' + msg;
    }
}

// ===== 全局错误捕获 =====
window.onerror = function(msg, url, line) {
    showError(msg + ' (line ' + line + ')');
    return true;
};

// ===== IE7/IE8 JSON 兼容层（完整版：parse + stringify） =====
if (typeof JSON === 'undefined') {
    window.JSON = {
        parse: function(t) { return (new Function('return ' + t))(); },
        stringify: function(o) {
            if (typeof o === 'string') return '"' + o.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n') + '"';
            if (typeof o === 'number' || typeof o === 'boolean') return '' + o;
            if (o === null || o === undefined) return 'null';
            if (o instanceof Array) {
                var a = [];
                for (var i = 0; i < o.length; i++) { a.push(JSON.stringify(o[i])); }
                return '[' + a.join(',') + ']';
            }
            var s = '{'; var first = true;
            for (var k in o) {
                if (!o.hasOwnProperty || o.hasOwnProperty(k)) {
                    if (!first) s += ','; first = false;
                    s += '"' + k + '":' + JSON.stringify(o[k]);
                }
            }
            s += '}'; return s;
        }
    };
} else {
    if (typeof JSON.stringify === 'undefined') {
        JSON.stringify = function(o) {
            if (typeof o === 'string') return '"' + o.replace(/\\/g,'\\\\').replace(/"/g,'\\"') + '"';
            if (typeof o === 'number' || typeof o === 'boolean') return '' + o;
            if (o === null || o === undefined) return 'null';
            if (o instanceof Array) {
                var a = [];
                for (var i = 0; i < o.length; i++) { a.push(JSON.stringify(o[i])); }
                return '[' + a.join(',') + ']';
            }
            var s = '{'; var first = true;
            for (var k in o) {
                if (!o.hasOwnProperty || o.hasOwnProperty(k)) {
                    if (!first) s += ','; first = false;
                    s += '"' + k + '":' + JSON.stringify(o[k]);
                }
            }
            s += '}'; return s;
        };
    }
}

// ===== 全局变量 =====
var charts = {};
var chartDataCache = null;
var referenceCurveData = {};   // 按 switchId|direction 索引的原始参考曲线
var standardCurveData = {};    // 按 switchId|direction 索引的标准曲线（参考+基线融合）
var baselineStore = {};       // 按 switchId 索引的诊断基线数据（功率）
var currentBaselineStore = {}; // 按 switchId 索引的电流诊断基线数据

// 默认配色（会被 C# 传入的 config 覆盖）
var colors = {
    currentA: '#00E5E5',
    currentB: '#FF5555',
    currentC: '#CC44CC',
    power: '#FFFFFF',
    thresholdLine: '#FF4444',
    background: '#3c3c3c',
    gridLine: '#6a6a6a',
    textColor: '#CCCCCC',
    refCurrentA: '#00E5E5',
    refCurrentB: '#FF5555',
    refCurrentC: '#CC44CC',
    refPower: '#55FF55'
};

// ===== 功率数据坐标变换（使 <0.6 的 0.2 步长与 >0.6 的 1.0 步长等宽） =====
function transformPowerValue(realValue) {
    if (realValue <= 0.6) return realValue * 5.0;       // 0→0, 0.2→1, 0.4→2, 0.6→3
    return 3.0 + (realValue - 0.6);                      // 1.6→4, 2.6→5, ...
}
function inversePowerValue(displayValue) {
    if (displayValue <= 3.0) return displayValue / 5.0;  // 1→0.2, 2→0.4, 3→0.6
    return 0.6 + (displayValue - 3.0);                   // 4→1.6, 5→2.6, ...
}
function transformPowerData(dataArray) {
    if (!dataArray) return null;
    var result = [];
    for (var i = 0; i < dataArray.length; i++) {
        result.push([dataArray[i][0], transformPowerValue(dataArray[i][1])]);
    }
    return result;
}

// ===== 鼠标滚轮缩放 =====
function setupMouseWheelZoom(chart, containerId) {
    var container = chart.container || document.getElementById(containerId);
    if (!container) return;

    var xAxis = chart.xAxis[0];
    var yAxis = chart.yAxis[0];
    if (!xAxis || !yAxis) return;

    // 记录初始范围（用 options 而非 axis 计算值，避免 Highcharts 内部
    // endOnTick/maxPadding 等调整导致取值不可靠）
    chart._initXMin = xAxis.options.min != null ? xAxis.options.min : 0;
    chart._initXMax = xAxis.options.max != null ? xAxis.options.max : 14;
    chart._initYMin = yAxis.options.min != null ? yAxis.options.min : 0;
    chart._initYMax = yAxis.options.max != null ? yAxis.options.max : 4;

    // 记录初始刻度配置（setExtremes 后需要恢复，否则刻度线数量/间距会变）
    chart._initXAxisTickInterval = xAxis.options.tickInterval;   // X 轴（可能 undefined，即自动）
    chart._initYAxisTickInterval = yAxis.options.tickInterval;   // 电流 Y 轴（0.5）
    // 注意：tickPositions 是数组，必须用 .slice() 做副本！
    // 而且 Highcharts 初始化后可能将 options.tickPositions 置为 null，
    // 此时需从 yAxis.tickPositions（实际计算值）获取初始刻度。
    var tp = yAxis.options.tickPositions;
    if (!tp || !tp.length) {
        tp = yAxis.tickPositions;
    }
    chart._initYAxisTickPositions = (tp && tp.length) ? tp.slice() : undefined; // 功率 Y 轴（自定义刻度数组）

    // 辅助函数：将 extremes 恢复到初始值并还原刻度配置
    function resetExtremesToInit() {
        var xA = chart.xAxis[0];
        var yA = chart.yAxis[0];
        if (!xA || !yA) return;
        try {
            // 先把初始刻度配置恢复到 axis.options 中，这样 setExtremes 内部
            // 调用 setScale 时就会用正确的 tick 配置来重新计算刻度线
            xA.options.min = chart._initXMin;
            xA.options.max = chart._initXMax;
            yA.options.min = chart._initYMin;
            yA.options.max = chart._initYMax;
            if (chart._initXAxisTickInterval !== undefined) {
                xA.options.tickInterval = chart._initXAxisTickInterval;
            }
            if (chart._initYAxisTickPositions !== undefined) {
                // 必须 .slice() 副本！否则 yA.options.tickPositions 和
                // _initYAxisTickPositions 指向同一数组，setExtremes 内部
                // 会原地修改它，导致第二次恢复时存档已被污染。
                yA.options.tickPositions = chart._initYAxisTickPositions.slice();
            } else if (chart._initYAxisTickInterval !== undefined) {
                yA.options.tickInterval = chart._initYAxisTickInterval;
            }
            // 恢复 extremes 并重绘（此时 options 中的刻度配置已经还原）
            xA.setExtremes(chart._initXMin, chart._initXMax, false);
            yA.setExtremes(chart._initYMin, chart._initYMax, false);
            chart.redraw();
        } catch(ex) {}
    }
    chart._resetExtremesToInit = resetExtremesToInit;

    function onWheel(e) {
        e = e || window.event;
        if (e.preventDefault) e.preventDefault();
        e.returnValue = false;

        var delta = 0;
        if (e.wheelDelta) {
            delta = e.wheelDelta / 120;
        } else if (e.detail) {
            delta = -e.detail / 3;
        }
        if (delta === 0) return;

        var xA = chart.xAxis[0];
        var yA = chart.yAxis[0];
        if (!xA || !yA) return;

        var xExt = xA.getExtremes();
        var yExt = yA.getExtremes();
        // 使用精确倒数，确保放大再缩小后范围不变：0.75 * (1/0.75) = 1
        var zoomFactor = (delta > 0) ? 0.75 : (1 / 0.75);

        // 以当前可视区域中心为缩放原点
        var xCenter = (xExt.min + xExt.max) / 2;
        var xHalf = (xExt.max - xExt.min) / 2 * zoomFactor;
        var yCenter = (yExt.min + yExt.max) / 2;
        var yHalf = (yExt.max - yExt.min) / 2 * zoomFactor;

        var newXMin = xCenter - xHalf;
        var newXMax = xCenter + xHalf;
        var newYMin = yCenter - yHalf;
        var newYMax = yCenter + yHalf;

        var xSnapped = false;
        var ySnapped = false;

        // 放大/缩小都不能超出初始坐标范围（保证曲线始终在可视区域内）
        // 先做基础裁剪：不允许任一侧超出初始边界
        newXMin = Math.max(chart._initXMin, newXMin);
        newXMax = Math.min(chart._initXMax, newXMax);
        newYMin = Math.max(chart._initYMin, newYMin);
        newYMax = Math.min(chart._initYMax, newYMax);

        // 缩小时：如果范围已完全覆盖初始范围，则弹回初始值（触发完整刻度恢复）
        if (zoomFactor > 1) {
            if (newXMin <= chart._initXMin && newXMax >= chart._initXMax) {
                newXMin = chart._initXMin;
                newXMax = chart._initXMax;
                xSnapped = true;
            }
            if (newYMin <= chart._initYMin && newYMax >= chart._initYMax) {
                newYMin = chart._initYMin;
                newYMax = chart._initYMax;
                ySnapped = true;
            }
        }

        // 如果已缩回初始范围，走完整恢复流程（含刻度配置恢复）
        if (xSnapped && ySnapped) {
            resetExtremesToInit();
        } else {
            // 仍在缩放中，X 轴先设不重绘，Y 轴触发重绘（减少不必要的重绘）
            xA.setExtremes(newXMin, newXMax, false);
            yA.setExtremes(newYMin, newYMax, true);
        }

        // 更新按钮状态
        updateResetZoomButton(chart);
    }

    // 移除旧的滚轮事件处理（避免重复挂载）
    if (container._wheelHandler) {
        if (container.removeEventListener) {
            container.removeEventListener('mousewheel', container._wheelHandler, false);
            container.removeEventListener('wheel', container._wheelHandler, false);
            container.removeEventListener('DOMMouseScroll', container._wheelHandler, false);
        } else if (container.detachEvent) {
            container.detachEvent('onmousewheel', container._wheelHandler);
        }
    }

    // 兼容 IE8+
    if (container.addEventListener) {
        container.addEventListener('mousewheel', onWheel, false);
        container.addEventListener('wheel', onWheel, false);
        container.addEventListener('DOMMouseScroll', onWheel, false);
    } else if (container.attachEvent) {
        container.attachEvent('onmousewheel', onWheel);
    }

    container._wheelHandler = onWheel;
}

// ===== 鼠标拖拽平移 =====
function setupMousePanDrag(chart, containerId) {
    if (!chart) return;
    var container = chart.container || document.getElementById(containerId);
    if (!container) return;

    var isDragging = false;
    var hasMoved = false;
    var startClientX = 0, startClientY = 0;
    var startXMin = 0, startXMax = 0;
    var startYMin = 0, startYMax = 0;

    var onMouseMove, onMouseUp;

    // 获取容器的绝对位置（兼容 IE8）
    function getContainerRect() {
        var left = 0, top = 0;
        var el = container;
        while (el) {
            left += el.offsetLeft || 0;
            top += el.offsetTop || 0;
            el = el.offsetParent;
        }
        return {
            left: left,
            top: top,
            width: container.offsetWidth || container.clientWidth || 0,
            height: container.offsetHeight || container.clientHeight || 0
        };
    }

    function onMouseDown(e) {
        e = e || window.event;
        // 只响应鼠标左键（IE8: button=1, 标准: button=0）
        var isLeft;
        if (document.addEventListener) {
            isLeft = (e.button === 0);
        } else {
            // IE8-: attachEvent 模式
            isLeft = (e.button === 1);
        }
        if (!isLeft) return;

        if (!chart) return;
        var xA = chart.xAxis[0];
        var yA = chart.yAxis[0];
        if (!xA || !yA) return;

        var clientX = e.clientX || e.pageX || 0;
        var clientY = e.clientY || e.pageY || 0;

        // 命中检测：判断鼠标是否在图表容器内
        var rect = getContainerRect();
        if (clientX < rect.left || clientX > rect.left + rect.width ||
            clientY < rect.top || clientY > rect.top + rect.height) return;

        var xExt = xA.getExtremes();
        var yExt = yA.getExtremes();

        isDragging = true;
        hasMoved = false;
        startClientX = clientX;
        startClientY = clientY;
        startXMin = xExt.min;
        startXMax = xExt.max;
        startYMin = yExt.min;
        startYMax = yExt.max;

        if (e.preventDefault) e.preventDefault();
        e.returnValue = false;

        try { container.style.cursor = 'move'; } catch(ex) {}

        // 在 document 上挂载 move/up，确保拖出容器外也能响应
        if (document.addEventListener) {
            document.addEventListener('mousemove', onMouseMove, false);
            document.addEventListener('mouseup', onMouseUp, false);
        } else if (document.attachEvent) {
            document.attachEvent('onmousemove', onMouseMove);
            document.attachEvent('onmouseup', onMouseUp);
        }
    }

    onMouseMove = function(e) {
        if (!isDragging) return;
        e = e || window.event;

        if (!chart) { isDragging = false; return; }
        var xA = chart.xAxis[0];
        var yA = chart.yAxis[0];
        if (!xA || !yA) { isDragging = false; return; }

        var curX = e.clientX || e.pageX || 0;
        var curY = e.clientY || e.pageY || 0;
        var dx = curX - startClientX;
        var dy = curY - startClientY;

        // 忽略微小移动（区分点击和拖拽）
        if (!hasMoved && Math.abs(dx) < 3 && Math.abs(dy) < 3) return;
        hasMoved = true;

        var plotW = chart.plotWidth || 1;
        var plotH = chart.plotHeight || 1;
        var rangeX = startXMax - startXMin;
        var rangeY = startYMax - startYMin;

        var newXMin = startXMin - dx * rangeX / plotW;
        var newXMax = startXMax - dx * rangeX / plotW;
        var newYMin = startYMin + dy * rangeY / plotH;
        var newYMax = startYMax + dy * rangeY / plotH;

        // 限制不能拖出初始范围
        var initXMin = chart._initXMin || 0;
        var initXMax = chart._initXMax || 14;
        var initYMin = chart._initYMin || 0;
        var initYMax = chart._initYMax || 4;

        if (newXMin < initXMin) { newXMin = initXMin; newXMax = initXMin + rangeX; }
        if (newXMax > initXMax) { newXMax = initXMax; newXMin = initXMax - rangeX; }
        if (newYMin < initYMin) { newYMin = initYMin; newYMax = initYMin + rangeY; }
        if (newYMax > initYMax) { newYMax = initYMax; newYMin = initYMax - rangeY; }

        try {
            xA.setExtremes(newXMin, newXMax);
            yA.setExtremes(newYMin, newYMax);
        } catch(ex) {}

        // 更新重置缩放按钮状态
        updateResetZoomButton(chart);
    };

    onMouseUp = function(e) {
        isDragging = false;
        try { container.style.cursor = ''; } catch(ex) {}

        if (document.removeEventListener) {
            document.removeEventListener('mousemove', onMouseMove, false);
            document.removeEventListener('mouseup', onMouseUp, false);
        } else if (document.detachEvent) {
            document.detachEvent('onmousemove', onMouseMove);
            document.detachEvent('onmouseup', onMouseUp);
        }
    };

    // 移除旧的 mousedown 处理器（挂在 document 上）
    if (container._panMouseDown) {
        if (document.removeEventListener) {
            document.removeEventListener('mousedown', container._panMouseDown, false);
        } else if (document.detachEvent) {
            document.detachEvent('onmousedown', container._panMouseDown);
        }
    }

    // mousedown 挂在 document 上（而非 container），绕过 IE SVG 事件冒泡问题
    if (document.addEventListener) {
        document.addEventListener('mousedown', onMouseDown, false);
    } else if (document.attachEvent) {
        document.attachEvent('onmousedown', onMouseDown);
    }

    container._panMouseDown = onMouseDown;
}

// ===== D7 辅助：根据 xVal 确定当前所处的阶段 key =====
function getPhaseKeyAtTime(phases, xVal) {
	if (!phases) return null;
	var segDefs = [
		{ key: 'spike',  startKey: 'spikeStartSec',  endKey: 'spikeEndSec' },
		{ key: 'unlock', startKey: 'unlockStartSec', endKey: 'unlockEndSec' },
		{ key: 'conv',   startKey: 'convStartSec',   endKey: 'convEndSec' },
		{ key: 'lock',   startKey: 'lockStartSec',   endKey: 'lockEndSec' },
		{ key: 'tail',   startKey: 'tailStartSec',   endKey: 'tailEndSec' }
	];
	for (var i = 0; i < segDefs.length; i++) {
		var seg = segDefs[i];
		var start = phases[seg.startKey];
		var end = phases[seg.endKey];
		if (start !== undefined && end !== undefined && xVal >= start && xVal <= end) {
			return seg.key;
		}
	}
	return null;
}

// ===== D7 辅助：从基线系列名称中提取阶段 key =====
function getBaselinePhaseKey(seriesName) {
	if (!seriesName) return null;
	if (seriesName.indexOf('尖峰') >= 0) return 'spike';
	if (seriesName.indexOf('解锁') >= 0) return 'unlock';
	if (seriesName.indexOf('转换') >= 0) return 'conv';
	if (seriesName.indexOf('锁闭') >= 0) return 'lock';
	if (seriesName.indexOf('缓放') >= 0) return 'tail';
	return null;
}

// ===== D7 辅助：从电流基线系列名称中提取相+阶段信息 =====
// "A-尖峰基线 1.23 A" → { phase: 'A', segKey: 'spike' }
// "B-解锁基线 0.45 A" → { phase: 'B', segKey: 'unlock' }
function getCurrentBaselinePhaseInfo(seriesName) {
	if (!seriesName || seriesName.indexOf('基线') < 0) return null;
	var phase = seriesName.charAt(0);
	if (phase !== 'A' && phase !== 'B' && phase !== 'C') return null;
	if (seriesName.charAt(1) !== '-') return null;

	var segKey = null;
	if (seriesName.indexOf('尖峰') >= 0) segKey = 'spike';
	else if (seriesName.indexOf('解锁') >= 0) segKey = 'unlock';
	else if (seriesName.indexOf('转换') >= 0) segKey = 'conv';
	else if (seriesName.indexOf('锁闭') >= 0) segKey = 'lock';
	else if (seriesName.indexOf('缓放') >= 0) segKey = 'tail';
	if (!segKey) return null;

	return { phase: phase, segKey: segKey };
}

// ===== D7 辅助：获取指定图表对应事件的电流每相阶段边界 =====
function getCurrentPhasesForChart(chartKey) {
	if (!chartDataCache) return null;
	var evt = (chartKey === 'chart1' || chartKey === 'chart2')
		? chartDataCache.currentEvent
		: chartDataCache.prevEvent;
	return (evt && evt.currentPhases) ? evt.currentPhases : null;
}

// ===== 鼠标追踪：自定义提示框 + 垂直参考线（用于所有4个图表） =====
function setupChartMouseTracking(chart, containerId) {
    if (!chart) return;
    var container = chart.container || document.getElementById(containerId);
    if (!container) return;

    var xAxis = chart.xAxis[0];
    var isPower = chart._isPowerChart || false;
    var tooltip = document.getElementById('tip_' + containerId);
    // Highcharts 渲染时会清空容器，静态 tooltip div 可能已被销毁，动态创建
    if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.id = 'tip_' + containerId;
        tooltip.className = 'custom-tooltip';
        container.appendChild(tooltip);
    }
    // 提示框初始隐藏，仅在鼠标位于绘图区时显示

    // 创建纯 CSS 垂直参考线（替代 plotLine，避免每次触发 Highcharts 全图重绘）
    var vline = document.getElementById('vline_' + containerId);
    if (!vline) {
        vline = document.createElement('div');
        vline.id = 'vline_' + containerId;
        vline.style.cssText = 'position:absolute;width:2px;background:#FFD700;' +
            'pointer-events:none;z-index:5;display:none;';
        container.appendChild(vline);
    }

    var lastUpdate = 0;
    var lastHtml = '';     // 上次提示框 HTML，避免无意义 DOM 重建

    // 获取容器的绝对位置（兼容 IE8）
    function getContainerOffset() {
        var left = 0, top = 0;
        var el = container;
        while (el) {
            left += el.offsetLeft || 0;
            top += el.offsetTop || 0;
            el = el.offsetParent;
        }
        return { left: left, top: top };
    }

    // 在给定 X 坐标处对序列数据进行线性插值
    function interpolateValue(series, x) {
        var data = series.data;
        if (!data || data.length === 0) return null;

        for (var i = 0; i < data.length - 1; i++) {
            var x0 = data[i].x;
            var x1 = data[i + 1].x;
            if (x >= x0 && x <= x1) {
                var y0 = data[i].y;
                var y1 = data[i + 1].y;
                if (x1 === x0) return y0;
                return y0 + (y1 - y0) * (x - x0) / (x1 - x0);
            }
        }
        if (data.length > 0) {
            if (x < data[0].x) return data[0].y;
            if (x > data[data.length - 1].x) return data[data.length - 1].y;
        }
        return null;
    }

    function onMouseMove(e) {
        e = e || window.event;

        // 检查鼠标按键是否被按下（拖拽平移中不更新提示）
        var isMouseDown = false;
        if (e.buttons !== undefined) {
            isMouseDown = e.buttons !== 0;
        } else if (e.button !== undefined) {
            isMouseDown = (e.button !== 0);
        }
        if (isMouseDown) return;

        // 节流：约 20fps
        var now = new Date().getTime();
        if (now - lastUpdate < 50) return;
        lastUpdate = now;

        var offset = getContainerOffset();
        var clientX = e.clientX || e.pageX || 0;
        var clientY = e.clientY || e.pageY || 0;
        var mouseX = clientX - offset.left;
        var mouseY = clientY - offset.top;

        var contW = container.offsetWidth || container.clientWidth || 0;
        var contH = container.offsetHeight || container.clientHeight || 0;

        // ---- 仅在绘图区内时显示提示框、垂直参考线和数值 ----
        var inPlot = (mouseX >= chart.plotLeft && mouseX <= chart.plotLeft + chart.plotWidth &&
                      mouseY >= chart.plotTop  && mouseY <= chart.plotTop  + chart.plotHeight);

        if (!inPlot) {
            vline.style.display = 'none';
            tooltip.style.display = 'none';
            lastHtml = '';
            return;
        }

        // 更新提示框位置（跟随鼠标）
        var tipW = 200;
        var tipH = 100;
        var tipLeft = mouseX + 16;
        var tipTop = mouseY - 30;

        if (tipLeft + tipW > contW)  tipLeft = mouseX - tipW - 10;
        if (tipTop < 0)              tipTop = mouseY + 16;
        if (tipTop + tipH > contH)   tipTop = contH - tipH - 4;
        if (tipLeft < 0)             tipLeft = 4;

        tooltip.style.left = tipLeft + 'px';
        tooltip.style.top = tipTop + 'px';
        tooltip.style.display = 'block';

        // 更新垂直参考线（纯 CSS div，无 Highcharts 重绘）
        vline.style.display = 'block';
        vline.style.left = mouseX + 'px';
        vline.style.top = chart.plotTop + 'px';
        vline.style.height = chart.plotHeight + 'px';

        // 将像素坐标转换为轴值
        var xExt = xAxis.getExtremes();
        var xVal = xExt.min + ((mouseX - chart.plotLeft) / (chart.plotWidth || 1)) * (xExt.max - xExt.min);

        // ---- 构建工具提示内容 ----
        var unit = isPower ? ' KW' : ' A';
        var html = '<div style="font-weight:bold;margin-bottom:5px;color:#FFD700;font-size:13px;">' +
                   xVal.toFixed(2) + ' 秒</div>';

        // 确定当前鼠标所处的阶段（用于过滤基线显示）
        var phases = getPhasesForChart(containerId);
        var currentPhaseKey = phases ? getPhaseKeyAtTime(phases, xVal) : null;

        // 遍历所有可见序列
        for (var s = 0; s < chart.series.length; s++) {
            var series = chart.series[s];
            if (!series.visible) continue;

            var sName = series.name || '';

            // 基线水平线段：仅当鼠标在对应阶段内时才显示
            if (sName.indexOf('基线-') === 0 && sName.indexOf('基线时长') !== 0) {
                if (currentPhaseKey === null) continue;
                var blKey = getBaselinePhaseKey(sName);
                if (blKey !== currentPhaseKey) continue;
            }

            // 电流基线水平线段：仅当鼠标在对应相的对应阶段内时才显示
            var cblInfo = getCurrentBaselinePhaseInfo(sName);
            if (cblInfo) {
                var curPhases = getCurrentPhasesForChart(containerId);
                if (!curPhases) continue;
                var cp = curPhases[cblInfo.phase];
                if (!cp) continue;
                var segStart = cp[cblInfo.segKey + 'StartSec'];
                var segEnd = cp[cblInfo.segKey + 'EndSec'];
                if (segStart === undefined || segEnd === undefined || xVal < segStart || xVal > segEnd) continue;
            }

            var yVal = interpolateValue(series, xVal);
            if (yVal === null) continue;

            var displayY = isPower ? inversePowerValue(yVal) : yVal;

            html += '<div style="margin:2px 0;">';
            html += '<span style="display:inline-block;width:10px;height:10px;background:' +
                    series.color + ';margin-right:5px;vertical-align:middle;"></span>';
            html += '<span style="vertical-align:middle;">' + series.name + ': ' +
                    displayY.toFixed(3) + unit + '</span>';
            html += '</div>';
        }

        // 参考时间行
        var refTime = chart._referenceTime || '';
        if (refTime) {
            html += '<div style="margin-top:5px;padding-top:4px;border-top:1px solid #555577;color:#BBBBBB;font-size:11px;">' +
                    '设定时间: ' + refTime + '</div>';
        }

        // 仅在内容变化时重建 DOM
        if (html !== lastHtml) {
            lastHtml = html;
            tooltip.innerHTML = html;
        }
    }

    function onMouseLeave() {
        vline.style.display = 'none';
        tooltip.style.display = 'none';
    }

    function onMouseEnter() {
        tooltip.style.display = 'block';
    }

    // 挂载事件（兼容 IE8+）
    if (container.addEventListener) {
        container.addEventListener('mousemove', onMouseMove, false);
        container.addEventListener('mouseleave', onMouseLeave, false);
        container.addEventListener('mouseenter', onMouseEnter, false);
    } else if (container.attachEvent) {
        container.attachEvent('onmousemove', onMouseMove);
        container.attachEvent('onmouseout', onMouseLeave);
        container.attachEvent('onmouseover', onMouseEnter);
    }
}

function updateResetZoomButton(chart) {
    var btn = document.getElementById('btnResetZoom');
    if (!btn) return;
    var keys = ['chart1', 'chart2', 'chart3', 'chart4'];
    var anyZoomed = false;
    for (var k = 0; k < keys.length; k++) {
        var c = charts[keys[k]];
        if (!c || !c.xAxis || !c.xAxis[0]) continue;
        var xExt = c.xAxis[0].getExtremes();
        if (xExt.min !== c._initXMin || xExt.max !== c._initXMax) {
            anyZoomed = true; break;
        }
        var yExt = c.yAxis[0].getExtremes();
        if (yExt.min !== c._initYMin || yExt.max !== c._initYMax) {
            anyZoomed = true; break;
        }
    }
    btn.disabled = !anyZoomed;
}

// ===== 诊断：检查 Highcharts 是否可用 =====
var highchartsReady = (typeof Highcharts !== 'undefined');

// ===== 格式化日期时间字符串 =====
// 输入 "2025-12-13 06:16:30" → 输出 "12/13 06:16:30"
function formatDatetime(datetimeStr) {
    if (!datetimeStr || datetimeStr.length < 19) return datetimeStr || '';
    var parts = datetimeStr.split(' ');
    var datePart = parts[0];  // "2025-12-13"
    var timePart = parts[1];  // "06:16:30"
    var dp = datePart.split('-');
    return dp[1] + '/' + dp[2] + ' ' + timePart;
}

// ===== 创建单个 Highcharts 图表 =====
function createChart(containerId, title, yAxisConfig, seriesData, xMax) {
    if (!highchartsReady) {
        showError('Highcharts library not loaded!');
        return null;
    }

    var container = document.getElementById(containerId);
    if (!container) {
        showError('Container ' + containerId + ' not found!');
        return null;
    }

    // 判断是否为功率图表（用于 tooltip 反向变换）
    var isPowerChart = (yAxisConfig._isPower === true);

    var chartConfig = {
        chart: {
            renderTo: containerId,
            type: 'spline',
            backgroundColor: colors.background,
            animation: false,
            marginRight: 20
        },
        title: {
            text: title,
            style: { color: '#FFFFFF', fontSize: '12px', fontWeight: 'bold' }
        },
        xAxis: {
            title: { text: '时间(秒)', style: { color: colors.textColor } },
            min: 0,
            max: xMax || 14,
            tickInterval: 1,
            lineColor: '#FFFFFF',
            lineWidth: 4,
            tickColor: '#FFFFFF',
            tickWidth: 1,
            tickLength: 5,
            labels: { style: { color: colors.textColor } },
            gridLineColor: colors.gridLine,
            gridLineWidth: 2
        },
        yAxis: yAxisConfig,
        tooltip: {
            enabled: false
        },
        legend: {
            align: 'center',
            layout: 'horizontal',
            verticalAlign: 'bottom',
            borderWidth: 0,
            itemStyle: { color: colors.textColor, fontSize: '10px' },
            itemHoverStyle: { color: '#ffffff' }
        },
        plotOptions: {
            spline: {
                lineWidth: 1.5,
                marker: { enabled: false },
                shadow: false
            }
        },
        credits: { enabled: false },
        series: seriesData
    };

    try {
        var chart = new Highcharts.Chart(chartConfig);
        if (chart) {
            // 标记功率图表，tooltip 用它做反向变换
            chart._isPowerChart = isPowerChart;
            chart._chartKey = containerId;
            // 设置鼠标滚轮缩放和拖拽平移
            setupMouseWheelZoom(chart, containerId);
            setupMousePanDrag(chart, containerId);
            // 设置鼠标追踪（自定义提示框 + 垂直参考线）
            setupChartMouseTracking(chart, containerId);
        }
        return chart;
    } catch(e) {
        showError('createChart failed for ' + containerId + ': ' + (e.message || e));
        return null;
    }
}

// ===== 构建电流 Y 轴配置 =====
function buildCurrentYAxis(thresholdValue) {
    var config = {
        title: { text: '电流(A)', style: { color: colors.textColor } },
        min: 0,
        max: 4.0,
        tickInterval: 0.5,
        lineColor: '#FFFFFF',
        lineWidth: 4,
        tickColor: '#FFFFFF',
        tickWidth: 1,
        tickLength: 5,
        labels: { style: { color: colors.textColor } },
        gridLineColor: colors.gridLine,
        gridLineWidth: 2,
        endOnTick: false
    };

    if (thresholdValue !== null && thresholdValue !== undefined) {
        config.plotLines = [{
            id: 'threshold-line',
            color: colors.thresholdLine,
            dashStyle: 'dash',
            value: thresholdValue,
            width: 1,
            label: {
                text: thresholdValue + ' A',
                style: { color: colors.thresholdLine, fontSize: '10px' },
                align: 'right'
            }
        }];
    }

    return config;
}

// ===== 构建功率 Y 轴配置（变换坐标：<0.6 的 0.2 步长与 >0.6 的 1.0 步长等宽） =====
function buildPowerYAxis(thresholdValue, maxPowerValue) {
    // 将真实最大功率值变换到显示坐标
    var dataMax = maxPowerValue || 0;
    var displayMax = transformPowerValue(dataMax);

    // 计算 Y 轴显示上限
    var yMaxDisplay;
    if (displayMax <= 3.0) {
        yMaxDisplay = 3.0;                     // 0.6 真实值对应显示坐标 3.0
    } else {
        yMaxDisplay = Math.ceil(displayMax);   // 按 1.0 步长向上取整
    }
    // 最小高度对应真实值 2.0 → 显示坐标 4.4 → 至少到 5.0
    if (yMaxDisplay < 5.0) yMaxDisplay = 5.0;

    // 生成显示坐标刻度：每格 1.0（视觉等距）
    var ticks = [];
    for (var t = 0; t <= yMaxDisplay + 0.001; t += 1.0) {
        ticks.push(Math.round(t * 100) / 100);
    }

    var config = {
        _isPower: true,   // 标记为功率轴
        title: { text: '功率(KW)', style: { color: colors.textColor } },
        min: 0,
        max: yMaxDisplay,
        tickPositions: ticks,
        lineColor: '#FFFFFF',
        lineWidth: 4,
        tickColor: '#FFFFFF',
        tickWidth: 1,
        tickLength: 5,
        labels: {
            style: { color: colors.textColor },
            formatter: function() {
                // 显示真实功率值
                var realVal = inversePowerValue(this.value);
                if (realVal < 0.01) return '0';
                return realVal.toFixed(1);
            }
        },
        gridLineColor: colors.gridLine,
        gridLineWidth: 2,
        endOnTick: false
    };

    if (thresholdValue !== null && thresholdValue !== undefined) {
        config.plotLines = [{
            id: 'threshold-line',
            color: colors.thresholdLine,
            dashStyle: 'dash',
            value: transformPowerValue(thresholdValue),
            width: 1,
            label: {
                text: thresholdValue + ' KW',
                style: { color: colors.thresholdLine, fontSize: '10px' },
                align: 'right'
            }
        }];
    }

    return config;
}

// ===== 构建图表标题 =====
// 格式: MM/dd HH:mm:ss.switchLabel.电流/功率曲线 方向:direction 时长:XX.XX秒
function buildChartTitle(eventData, switchLabel, curveType) {
    var dt = formatDatetime(eventData.datetime);
    var duration = (typeof eventData.duration === 'number') ? eventData.duration.toFixed(2) : '0.00';
    var direction = eventData.direction || '';
    return dt + '.' + switchLabel + '.' + curveType + ' 方向:' + direction + ' 时长:' + duration + '秒';
}

// ===== 双击检测 =====
function setupDblClick() {
    var keys = ['chart1', 'chart2', 'chart3', 'chart4'];
    for (var k = 0; k < keys.length; k++) {
        var key = keys[k];
        if (!charts[key]) continue;
        (function(chartKey) {
            var container = document.getElementById(chartKey);
            if (!container) return;
            container.ondblclick = function() {
                handleChartDblClick(chartKey);
            };
        })(key);
    }
}

function handleChartDblClick(chartKey) {
    if (!chartDataCache) return;
    var detailData = buildDetailData(chartKey);
    if (!detailData) return;
    var dataJson = JSON.stringify(detailData);
    try { window.external.OpenChartDetail(chartKey, dataJson); } catch(e) {}
}

// ===== 构建独立窗口数据 =====
function buildDetailData(chartKey) {
    var data = chartDataCache;
    var evt = data.currentEvent;
    if (!evt) return null;

    var label = (data.switchLabel || data.switchId || '');
    var seriesData = [];
    var title = '';
    var yAxisType = 'current';
    var xMax = 14;

    if (chartKey === 'chart1' || chartKey === 'chart3') {
        var srcEvt = (chartKey === 'chart1') ? evt : data.prevEvent;
        if (!srcEvt) return null;
        title = buildChartTitle(srcEvt, label, '电流曲线');
        if (srcEvt.currentA) seriesData.push({ name: '电流(A)', color: colors.currentA, data: srcEvt.currentA });
        if (srcEvt.currentB) seriesData.push({ name: '电流(B)', color: colors.currentB, data: srcEvt.currentB });
        if (srcEvt.currentC) seriesData.push({ name: '电流(C)', color: colors.currentC, data: srcEvt.currentC });
        yAxisType = 'current';
        // 按该事件的时长独立计算 X 轴上界
        var d1 = (typeof srcEvt.duration === 'number') ? srcEvt.duration : 0;
        xMax = Math.ceil(d1);
        if (xMax < 5) xMax = 5;
    } else if (chartKey === 'chart2' || chartKey === 'chart4') {
        var srcEvt2 = (chartKey === 'chart2') ? evt : data.prevEvent;
        if (!srcEvt2 || !srcEvt2.power) return null;
        title = buildChartTitle(srcEvt2, label, '功率曲线');
        seriesData.push({ name: '功率', color: colors.power, data: srcEvt2.power });
        yAxisType = 'power';
        // 按该事件的时长独立计算 X 轴上界
        var d2 = (typeof srcEvt2.duration === 'number') ? srcEvt2.duration : 0;
        xMax = Math.ceil(d2);
        if (xMax < 5) xMax = 5;
    } else {
        return null;
    }

    return {
        title: title,
        yAxisTitle: (yAxisType === 'current') ? '电流(A)' : '功率(KW)',
        yAxisType: yAxisType,
        seriesData: seriesData,
        thresholdValue: (yAxisType === 'current') ? data.thresholdCurrent : data.thresholdPower,
        xMax: xMax,
        colors: colors,
        referenceTime: getCurrentReference() ? (getCurrentReference().label || '') : ''
    };
}

// ===== D5: 渲染诊断结论条（纯 DOM 操作，不用 Highcharts） =====
function renderDiagnosisBar(diagnosis) {
    var bar = document.getElementById('diagBar');
    if (!bar) return;

    // 未诊断（无 diagnosis 或 null）
    if (!diagnosis) {
        bar.className = 'diag-bar diag-bar-unknown';
        bar.innerHTML = '<span class="diag-dot diag-dot-unknown">●</span>未诊断';
        bar.title = '';
        return;
    }

    var level = diagnosis.level || '正常';
    var items = diagnosis.items || [];

    // 级别→CSS 类映射
    var cssSuffix;
    if (level === '预警') cssSuffix = 'warning';
    else if (level === '报警') cssSuffix = 'alarm';
    else if (level === '故障') cssSuffix = 'fault';
    else cssSuffix = 'normal';

    if (level === '正常') {
        bar.className = 'diag-bar diag-bar-normal';
        bar.innerHTML = '<span class="diag-dot diag-dot-normal">●</span>诊断正常';
        bar.title = '';
    } else {
        bar.className = 'diag-bar diag-bar-' + cssSuffix;
        var text = items.join('；');
        bar.innerHTML = text;
        bar.title = text;
    }
}

// ===== 加载图表数据（由 C# 通过 InvokeScript 调用） =====
function loadChartData(dataJson) {
    var ds = document.getElementById('diagStatus');
    if (ds) ds.innerText = '收到数据...';

    var data;
    if (typeof dataJson === 'string') {
        try { data = JSON.parse(dataJson); } catch(e) {
            showError('JSON parse error in loadChartData: ' + (e.message || e));
            return;
        }
    } else {
        data = dataJson;
    }

    if (!data) return;
    chartDataCache = data;

    // 更新颜色配置（C# JavaScriptSerializer 使用 PascalCase 属性名）
    if (data.colors) {
        var c = data.colors;
        colors.currentA = c.CurrentA || c.currentA || colors.currentA;
        colors.currentB = c.CurrentB || c.currentB || colors.currentB;
        colors.currentC = c.CurrentC || c.currentC || colors.currentC;
        colors.power = c.Power || c.power || colors.power;
        colors.thresholdLine = c.ThresholdLine || c.thresholdLine || colors.thresholdLine;
        colors.background = c.Background || c.background || colors.background;
        colors.gridLine = c.GridLine || c.gridLine || colors.gridLine;
        colors.textColor = c.TextColor || c.textColor || colors.textColor;
        colors.refCurrentA = c.RefCurrentA || c.refCurrentA || colors.refCurrentA;
        colors.refCurrentB = c.RefCurrentB || c.refCurrentB || colors.refCurrentB;
        colors.refCurrentC = c.RefCurrentC || c.refCurrentC || colors.refCurrentC;
        colors.refPower = c.RefPower || c.refPower || colors.refPower;
    }

    // 隐藏空状态
    document.getElementById('emptyState').style.display = 'none';

    // 显示图表网格
    var grid = document.getElementById('chartGrid');
    if (grid) grid.style.display = 'block';

    // 启用按钮
    document.getElementById('btnSetReference').disabled = false;
    document.getElementById('btnResetZoom').disabled = false;

    var thresholdCurrent = data.thresholdCurrent || null;
    var thresholdPower = data.thresholdPower || null;
    var label = data.switchLabel || data.switchId || '';
    var evt = data.currentEvent;
    var prevEvt = data.prevEvent || null;

    // 每个图独立计算 X 轴上限（避免长事件拉长短事件的 X 轴）
    function calcXMax(evtData) {
        if (!evtData) return 5;
        var d = (typeof evtData.duration === 'number') ? evtData.duration : 0;
        var m = Math.ceil(d);
        return m < 5 ? 5 : m;
    }
    var xMaxCurrent = calcXMax(evt);
    var xMaxPrev = prevEvt ? calcXMax(prevEvt) : 5;

    if (!evt) {
        showError('当前事件数据为空');
        return;
    }

    // 每个图独立计算功率 Y 轴上限（避免高功率事件拉长低功率事件的 Y 轴）
    function calcMaxPower(evtData) {
        var m = 0;
        if (evtData && evtData.power) {
            for (var i = 0; i < evtData.power.length; i++) {
                if (evtData.power[i][1] > m) m = evtData.power[i][1];
            }
        }
        return m;
    }
    var maxPowerCurrent = calcMaxPower(evt);
    var maxPowerPrev = prevEvt ? calcMaxPower(prevEvt) : 0;

    // 销毁旧图表
    destroyCharts();

    // === 上排左：当前事件 · 电流曲线 ===
    var seriesCurrent = [];
    if (evt.currentA) seriesCurrent.push({
        name: '电流(A)',
        color: colors.currentA,
        data: evt.currentA,
        lineWidth: 1.5,
        visible: document.getElementById('chkCurrentA').checked
    });
    if (evt.currentB) seriesCurrent.push({
        name: '电流(B)',
        color: colors.currentB,
        data: evt.currentB,
        lineWidth: 1.5,
        visible: document.getElementById('chkCurrentB').checked
    });
    if (evt.currentC) seriesCurrent.push({
        name: '电流(C)',
        color: colors.currentC,
        data: evt.currentC,
        lineWidth: 1.5,
        visible: document.getElementById('chkCurrentC').checked
    });

    charts.chart1 = createChart('chart1',
        buildChartTitle(evt, label, '电流曲线'),
        buildCurrentYAxis(thresholdCurrent),
        seriesCurrent, xMaxCurrent);

    // === 上排右：当前事件 · 功率曲线 ===
    if (evt.power) {
        var seriesPower = [{
            name: '功率',
            color: colors.power,
            data: transformPowerData(evt.power),
            lineWidth: 2.5,
            visible: document.getElementById('chkPower').checked
        }];
        charts.chart2 = createChart('chart2',
            buildChartTitle(evt, label, '功率曲线'),
            buildPowerYAxis(thresholdPower, maxPowerCurrent),
            seriesPower, xMaxCurrent);
    }

    // === 下排左：上一次事件 · 电流曲线 ===
    if (prevEvt) {
        var prevSeriesCurrent = [];
        if (prevEvt.currentA) prevSeriesCurrent.push({
            name: '电流(A)',
            color: colors.currentA,
            data: prevEvt.currentA,
            lineWidth: 1.5,
            visible: document.getElementById('chkCurrentA').checked
        });
        if (prevEvt.currentB) prevSeriesCurrent.push({
            name: '电流(B)',
            color: colors.currentB,
            data: prevEvt.currentB,
            lineWidth: 1.5,
            visible: document.getElementById('chkCurrentB').checked
        });
        if (prevEvt.currentC) prevSeriesCurrent.push({
            name: '电流(C)',
            color: colors.currentC,
            data: prevEvt.currentC,
            lineWidth: 1.5,
            visible: document.getElementById('chkCurrentC').checked
        });

        charts.chart3 = createChart('chart3',
            buildChartTitle(prevEvt, label, '电流曲线'),
            buildCurrentYAxis(thresholdCurrent),
            prevSeriesCurrent, xMaxPrev);

        // === 下排右：上一次事件 · 功率曲线 ===
        if (prevEvt.power) {
            var prevSeriesPower = [{
                name: '功率',
                color: colors.power,
                data: transformPowerData(prevEvt.power),
                lineWidth: 2.5,
                visible: document.getElementById('chkPower').checked
            }];
            charts.chart4 = createChart('chart4',
                buildChartTitle(prevEvt, label, '功率曲线'),
                buildPowerYAxis(thresholdPower, maxPowerPrev),
                prevSeriesPower, xMaxPrev);
        }
    }

    // 如果参考曲线已勾选且有当前转辙机的参考数据，叠加参考曲线
    if (document.getElementById('chkReference').checked && getCurrentReference()) {
        addReferenceSeries();
    }

    // 更新按钮状态，反映当前转辙机是否已有参考曲线
    updateReferenceButton();

    // 设置双击检测
    setupDblClick();

    // 存储参考时间到各图表（供鼠标追踪提示框使用）
    var curRef = getCurrentReference();
    var refLabel = curRef ? (curRef.label || '') : '';
    var ckeys = ['chart1', 'chart2', 'chart3', 'chart4'];
    for (var ck = 0; ck < ckeys.length; ck++) {
        var ch = charts[ckeys[ck]];
        if (ch) ch._referenceTime = refLabel;
    }

    // D5: 渲染诊断结论条
    renderDiagnosisBar(data.diagnosis || null);

    // D8: 更新参考曲线/标准曲线设定状态
    updateRefCurveStatus(data);

    // D8: 加载标准曲线（参考曲线 + 基线融合），存入独立字典
    if (data.standardCurves && data.standardCurves.length > 0) {
        for (var ii = 0; ii < data.standardCurves.length; ii++) {
            loadStandardCurveFromBackend(data.standardCurves[ii], data.switchId);
        }
    } else if (data.standardCurve) {
        loadStandardCurveFromBackend(data.standardCurve, data.switchId);
    }

    // D6: 加载原始参考曲线（功率）
    if (data.refCurves && data.refCurves.length > 0) {
        for (var jj = 0; jj < data.refCurves.length; jj++) {
            loadRefCurveFromBackend(data.refCurves[jj], data.switchId);
        }
    } else if (data.refCurve) {
        loadRefCurveFromBackend(data.refCurve, data.switchId);
    }

    // D6b: 加载电流原始参考曲线（分相）
    if (data.currentRefCurves && data.currentRefCurves.length > 0) {
        for (var jc = 0; jc < data.currentRefCurves.length; jc++) {
            loadRefCurveFromBackend(data.currentRefCurves[jc], data.switchId);
        }
    }
    // D8b: 加载电流标准曲线（分相中位统计）
    if (data.currentStandardCurves && data.currentStandardCurves.length > 0) {
        for (var cc = 0; cc < data.currentStandardCurves.length; cc++) {
            loadStandardCurveFromBackend(data.currentStandardCurves[cc], data.switchId);
        }
    }

    // 如果参考曲线复选框已勾选（无论标准还是原始），叠加显示
    if (document.getElementById('chkReference').checked && getCurrentReference()) {
        addReferenceSeries();
    }

    // D7: 存储并自动叠加诊断基线（功率）
    if (data.baseline) {
        baselineStore[data.switchId] = data.baseline;
        // 如果基线复选框已勾选，立即叠加显示
        if (document.getElementById('chkBaseline').checked) {
            addBaselineLines();
        }
    }

    // D7: 存储并自动叠加电流诊断基线
    if (data.currentBaseline) {
        currentBaselineStore[data.switchId] = data.currentBaseline;
        if (document.getElementById('chkCurrentBaseline').checked) {
            addCurrentBaselineLines();
        }
    }

    if (ds) ds.innerText = '渲染完成 OK';
}

// ===== D6: 从后端加载参考曲线并存入 referenceCurveData =====
function loadRefCurveFromBackend(refCurveData, switchId) {
    if (!refCurveData || !switchId) return;
    // 至少需要有功率或电流数据
    if (!refCurveData.values && !refCurveData.currentA && !refCurveData.currentB && !refCurveData.currentC) return;

    // 方向感知 key：switchId|direction
    var direction = refCurveData.direction || '';
    var key = switchId + (direction ? '|' + direction : '');

    // 检查是否已有用户手动设定的参考曲线（用户设定优先级更高）
    if (referenceCurveData[key] && referenceCurveData[key]._manual) {
        return;
    }

    // 获取或创建参考曲线对象（支持合并：功率+电流可能分两次加载）
    var ref = referenceCurveData[key] || {
        direction: direction,
        currentA: null,
        currentB: null,
        currentC: null,
        power: null,
        label: switchId + ' ' + direction + ' 参考曲线'
    };

    // 合并数据
    if (refCurveData.values) { ref.power = refCurveData.values; }
    if (refCurveData.currentA) { ref.currentA = refCurveData.currentA; }
    if (refCurveData.currentB) { ref.currentB = refCurveData.currentB; }
    if (refCurveData.currentC) { ref.currentC = refCurveData.currentC; }

    referenceCurveData[key] = ref;

    // 更新按钮文本
    var label = chartDataCache ? (chartDataCache.switchLabel || switchId) : switchId;
    document.getElementById('btnSetReference').innerHTML = label + ' 已载入参考';
}

// ===== D8: 从后端加载标准曲线（中位统计），存入独立字典 =====
function loadStandardCurveFromBackend(scData, switchId) {
    if (!scData || !switchId) return;
    // 至少需要有功率或电流数据
    if (!scData.values && !scData.currentA && !scData.currentB && !scData.currentC) return;

    var direction = scData.direction || '';
    var key = switchId + (direction ? '|' + direction : '');

    // 获取或创建标准曲线对象（支持合并：功率+电流可能分两次加载）
    var sc = standardCurveData[key] || {
        direction: direction,
        currentA: null,
        currentB: null,
        currentC: null,
        power: null,
        fusionWeight: scData.fusionWeight || 0,
        label: switchId + ' ' + direction + ' 标准曲线(中位统计)'
    };

    // 合并数据
    if (scData.values) { sc.power = scData.values; }
    if (scData.currentA) { sc.currentA = scData.currentA; }
    if (scData.currentB) { sc.currentB = scData.currentB; }
    if (scData.currentC) { sc.currentC = scData.currentC; }
    if (scData.fusionWeight !== undefined && scData.fusionWeight !== null) {
        sc.fusionWeight = scData.fusionWeight;
    }

    standardCurveData[key] = sc;

    // 若当前事件的曲线方向匹配，同步融合权重到下拉菜单
    if (!_fusionWeightChanging && chartDataCache && chartDataCache.currentEvent) {
        var ceDir = chartDataCache.currentEvent.direction || '';
        if (direction === ceDir && scData.fusionWeight !== undefined) {
            var sel = document.getElementById('selFusionWeight');
            if (sel) {
                var pct = Math.round(scData.fusionWeight * 100);
                if (sel.querySelector('option[value="' + pct + '"]')) {
                    sel.value = String(pct);
                }
            }
        }
    }
}

// 构建参考曲线字典 key
function makeRefKey(switchId, direction) {
    if (!switchId) return '';
    return switchId + (direction ? '|' + direction : '');
}

// ===== 读取融合权重（0.0 ~ 1.0） =====
function getFusionWeight() {
    var sel = document.getElementById('selFusionWeight');
    if (!sel) return 1.0;
    var val = parseInt(sel.value, 10);
    if (isNaN(val)) return 1.0;
    return val / 100.0;
}

// ===== 重置所有图表缩放 =====
function resetAllZoom() {
    var keys = ['chart1', 'chart2', 'chart3', 'chart4'];
    for (var k = 0; k < keys.length; k++) {
        var chart = charts[keys[k]];
        if (!chart) continue;
        // 如果有存储的完整恢复函数，优先使用（会同时恢复刻度配置）
        if (chart._resetExtremesToInit) {
            try { chart._resetExtremesToInit(); } catch(e) {}
        } else if (chart.xAxis && chart.xAxis[0]) {
            try {
                chart.xAxis[0].setExtremes(chart._initXMin, chart._initXMax);
                chart.yAxis[0].setExtremes(chart._initYMin, chart._initYMax);
            } catch(e) {}
        }
    }
    document.getElementById('btnResetZoom').disabled = true;
}

// ===== 更新参考曲线按钮状态 =====
function updateReferenceButton() {
    var btn = document.getElementById('btnSetReference');
    var cancelBtn = document.getElementById('btnCancelReference');
    if (!btn) return;

    var ce = chartDataCache ? chartDataCache.currentEvent : null;
    var direction = (ce && ce.direction) ? ce.direction : '';
    var key = makeRefKey((chartDataCache && chartDataCache.switchId) || '', direction);
    var hasRef = referenceCurveData[key] || standardCurveData[key];

    // 判断当前方向是否为人工设定（只有人工设定才能取消）
    var isManual = false;
    var status = (chartDataCache && chartDataCache.refCurveStatus);
    if (status && status.directions) {
        for (var d = 0; d < status.directions.length; d++) {
            if (status.directions[d].direction === direction) {
                isManual = (status.directions[d].refSource === 'manual');
                break;
            }
        }
    }

    var label = (chartDataCache && (chartDataCache.switchLabel || chartDataCache.switchId)) || '';
    if (hasRef) {
        var srcLabel = isManual ? ' [人工]' : ' [自动]';
        btn.innerHTML = label + ' ' + direction + ' 已设定参考曲线' + srcLabel;
    } else {
        btn.innerHTML = '设定参考曲线';
    }

    // 取消按钮：仅当当前方向为人工设定的参考曲线时才启用
    if (cancelBtn) {
        cancelBtn.disabled = !(hasRef && isManual);
        if (hasRef && isManual && direction) {
            cancelBtn.title = '取消 ' + direction + ' 的人工参考曲线设定';
        } else if (hasRef && !isManual) {
            cancelBtn.title = '当前为自动生成的曲线，取消基线融合即可隐藏';
        } else {
            cancelBtn.title = '';
        }
    }
}

// ===== D8: 更新参考曲线/标准曲线设定状态显示 =====
var DIRECTION_LABELS = {
    '定位→反位': '反操(定→反)',
    '反位→定位': '定操(反→定)'
};

function refSourceColor(source) {
    // 仅人工设定为绿色，其余均为灰色
    if (source === 'manual') return '#4f4';  // 绿色：人工设定
    return '#888';                            // 灰色：无人工设定
}

function standardDotColor(hasStandard) {
    return hasStandard ? '#4f4' : '#888';  // 标准曲线：有=绿，无=灰
}

function updateRefCurveStatus(data) {
    var el = document.getElementById('refCurveStatus');
    if (!el) return;

    // data 优先从 chartDataCache.refCurveStatus 取，也接受直接传入
    var status = (data && data.refCurveStatus) || (chartDataCache && chartDataCache.refCurveStatus);
    if (!status || !status.directions || status.directions.length === 0) {
        el.style.display = 'none';
        return;
    }

    var html = '';
    for (var i = 0; i < status.directions.length; i++) {
        var d = status.directions[i];
        var label = DIRECTION_LABELS[d.direction] || d.direction;
        // 参考点: 仅人工设定为绿色
        var refColor = refSourceColor(d.refSource || '');
        var refDot = d.hasReference
            ? '<span style="color:' + refColor + ';">&#9679;</span>'
            : '<span style="color:#888;">&#9678;</span>';
        // 标准点: 有标准曲线即为绿色（由基线数据生成），无则为灰色
        var scColor = standardDotColor(d.hasStandard);
        var scDot = d.hasStandard
            ? '<span style="color:' + scColor + ';">&#9679;</span>'
            : '<span style="color:#888;">&#9678;</span>';
        html += '<span title="' + d.direction + ' 参考:' + (d.hasReference ? '已设定' : '未设定(人工)') + ' 标准:' + (d.hasStandard ? '已生成(基线)' : '未生成') + '">'
            + label + ' 参考' + refDot + ' 标准' + scDot
            + '</span>';
        if (i < status.directions.length - 1) {
            html += ' &nbsp;|&nbsp; ';
        }
    }

    el.innerHTML = html;
    el.style.display = 'inline';
}

// ===== 获取当前转辙机的参考曲线（按方向），受"基线融合"复选框控制 =====
function getCurrentReference() {
    if (!chartDataCache) return null;
    var sid = chartDataCache.switchId;
    if (!sid) return null;
    var ce = chartDataCache.currentEvent;
    var direction = (ce && ce.direction) ? ce.direction : '';
    var key = makeRefKey(sid, direction);

    // 基线融合勾选且有标准曲线 → 返回融合后的标准曲线
    var fusionChk = document.getElementById('chkFusion');
    var useFusion = fusionChk && fusionChk.checked;
    if (useFusion && standardCurveData[key]) {
        return standardCurveData[key];
    }

    // 否则返回原始参考曲线
    var ref = referenceCurveData[key];
    if (ref) return ref;

    // 降级：无方向匹配时返回该 switchId 的任一条
    // 优先标准曲线
    if (useFusion) {
        for (var sk in standardCurveData) {
            if (standardCurveData.hasOwnProperty(sk) && sk.indexOf(sid + '|') === 0) {
                return standardCurveData[sk];
            }
        }
    }
    for (var k in referenceCurveData) {
        if (referenceCurveData.hasOwnProperty(k) && k.indexOf(sid + '|') === 0) {
            return referenceCurveData[k];
        }
    }
    return null;
}

// ===== 基线融合复选框切换 =====
function toggleFusion() {
    // 先移除旧参考曲线，再按新模式叠加
    removeReferenceSeries();
    if (document.getElementById('chkReference').checked) {
        addReferenceSeries();
    }
    // 如果勾选了融合，触发标准曲线重建（使权重立即生效）
    if (document.getElementById('chkFusion').checked) {
        onFusionWeightChange();
    }
}

// ===== 融合权重选择器变更 → 重建标准曲线 =====
var _fusionWeightChanging = false;

function onFusionWeightChange() {
    // 防止 C# LoadCurveData → loadChartData → 下拉同步 → onchange 导致的死循环
    if (_fusionWeightChanging) return;
    _fusionWeightChanging = true;

    try {
        var w = getFusionWeight();

        // 更新 tooltip 显示当前权重
        var sel = document.getElementById('selFusionWeight');
        if (sel) sel.title = '融合权重：' + Math.round(w * 100) + '% — ' +
            (w >= 1.0 ? '纯中位标准曲线' : w <= 0.0 ? '纯人工参考曲线' : '参考+中位混合');

        // 仅当融合模式开启且有数据时才触发后端重建
        var fusionChk = document.getElementById('chkFusion');
        if (!fusionChk || !fusionChk.checked) return;
        if (!chartDataCache || !chartDataCache.switchId) return;

        var sid = chartDataCache.switchId;
        var ce = chartDataCache.currentEvent;
        var direction = (ce && ce.direction) ? ce.direction : '';
        if (!direction) return;

        // 检查是否有参考曲线数据（人工或自动）
        var key = makeRefKey(sid, direction);
        if (!referenceCurveData[key] && !standardCurveData[key]) return;

        window.external.SetFusionWeight(sid, direction, w);
        // 更新状态栏以确认权重已应用
        var statusEl = document.getElementById('refCurveStatus');
        if (statusEl) {
            statusEl.title = '上次权重更新: ' + Math.round(w * 100) + '% (' + new Date().toLocaleTimeString() + ')';
        }
    } finally {
        // 延迟重置防护，等待 C# 的 LoadCurveData 往返完成
        setTimeout(function() { _fusionWeightChanging = false; }, 500);
    }
}

// ===== 设定参考曲线 =====
function setReferenceCurve() {
    if (!chartDataCache) return;
    var sid = chartDataCache.switchId;
    if (!sid) return;

    var ref = {
        currentA: null, currentB: null, currentC: null, power: null, label: ''
    };

    var ce = chartDataCache.currentEvent;
    if (ce) {
        if (ce.currentA) { ref.currentA = []; for (var i = 0; i < ce.currentA.length; i++) { ref.currentA.push([ce.currentA[i][0], ce.currentA[i][1]]); } }
        if (ce.currentB) { ref.currentB = []; for (var i = 0; i < ce.currentB.length; i++) { ref.currentB.push([ce.currentB[i][0], ce.currentB[i][1]]); } }
        if (ce.currentC) { ref.currentC = []; for (var i = 0; i < ce.currentC.length; i++) { ref.currentC.push([ce.currentC[i][0], ce.currentC[i][1]]); } }
        if (ce.power) { ref.power = []; for (var i = 0; i < ce.power.length; i++) { ref.power.push([ce.power[i][0], ce.power[i][1]]); } }
        ref.label = (ce.datetime || '') + ' (参考)';
    }

    // 按转辙机号+方向存储参考曲线
    var refKey = makeRefKey(sid, (ce && ce.direction) ? ce.direction : '');
    referenceCurveData[refKey] = ref;

    // 更新按钮文本，显示当前转辙机号+方向
    var label = (chartDataCache.switchLabel || sid) + ' ' + ((ce && ce.direction) ? ce.direction : '');
    document.getElementById('btnSetReference').innerHTML = label + ' 已设定参考曲线';

    // 更新所有图表的参考时间（供鼠标追踪提示框使用）
    var refLabel = ref.label || '';
    var ckeys2 = ['chart1', 'chart2', 'chart3', 'chart4'];
    for (var ck2 = 0; ck2 < ckeys2.length; ck2++) {
        var ch2 = charts[ckeys2[ck2]];
        if (ch2) ch2._referenceTime = refLabel;
    }

    if (document.getElementById('chkReference').checked) {
        addReferenceSeries();
    }

    // ── D8: 调用 C# 保存参考曲线并自动生成标准曲线 ──
    try {
        var powerValues = [];
        if (ce && ce.power) {
            for (var i = 0; i < ce.power.length; i++) {
                powerValues.push(ce.power[i][1]);  // 只取 Y 值
            }
        }
        var direction = (ce && ce.direction) ? ce.direction : '';
        window.external.SetReferenceCurve(sid, JSON.stringify(powerValues), direction, getFusionWeight());

        // 乐观更新状态显示：当前方向已人工设定
        if (chartDataCache && chartDataCache.refCurveStatus && chartDataCache.refCurveStatus.directions) {
            var dirs = chartDataCache.refCurveStatus.directions;
            for (var d = 0; d < dirs.length; d++) {
                if (dirs[d].direction === direction) {
                    dirs[d].hasReference = true;
                    dirs[d].refSource = 'manual';
                    dirs[d].hasStandard = true;
                    break;
                }
            }
        }
        updateRefCurveStatus();
    } catch(e) {
        // 兼容旧版 C# 无此方法时静默忽略
    }
}

// ===== 取消设定参考曲线（仅删除人工参考曲线，标准曲线由后端从基线重建） =====
function cancelReferenceCurve() {
    if (!chartDataCache) return;
    var sid = chartDataCache.switchId;
    if (!sid) return;

    var ce = chartDataCache.currentEvent;
    var direction = (ce && ce.direction) ? ce.direction : '';
    if (!direction) return;

    // 仅允许取消人工设定的参考曲线
    var isManual = false;
    var status = (chartDataCache && chartDataCache.refCurveStatus);
    if (status && status.directions) {
        for (var d = 0; d < status.directions.length; d++) {
            if (status.directions[d].direction === direction) {
                isManual = (status.directions[d].refSource === 'manual');
                break;
            }
        }
    }
    if (!isManual) {
        alert('当前方向（' + direction + '）无人工设定参考曲线，无需取消。');
        return;
    }

    var key = makeRefKey(sid, direction);

    // 1. 删除前端缓存的参考曲线
    if (referenceCurveData[key]) {
        delete referenceCurveData[key];
    }

    // 2. 刷新图表（标准曲线由基线独立生成，不受影响）
    removeReferenceSeries();
    if (document.getElementById('chkReference').checked) {
        addReferenceSeries();
    }

    // 3. 更新按钮状态
    updateReferenceButton();

    // 4. 更新状态指示器：仅清除人工参考标记，标准曲线不变
    if (chartDataCache && chartDataCache.refCurveStatus && chartDataCache.refCurveStatus.directions) {
        var dirs = chartDataCache.refCurveStatus.directions;
        for (var d = 0; d < dirs.length; d++) {
            if (dirs[d].direction === direction) {
                dirs[d].hasReference = false;
                dirs[d].refSource = '';
                break;
            }
        }
    }
    updateRefCurveStatus();

    // 5. 调用 C# 删除人工参考曲线文件（标准曲线保持不变）
    try {
        window.external.CancelReferenceCurve(sid, direction, '', 0);
    } catch(e) { }
}

// ===== 添加参考曲线到图表 =====
// ===== 获取指定图表对应方向的参考曲线（按图表事件方向匹配） =====
function getReferenceForChart(chartKey) {
    if (!chartDataCache) return null;
    var sid = chartDataCache.switchId;
    if (!sid) return null;

    // chart1/2 → currentEvent, chart3/4 → prevEvent
    var evt = (chartKey === 'chart1' || chartKey === 'chart2')
        ? chartDataCache.currentEvent
        : chartDataCache.prevEvent;
    var direction = (evt && evt.direction) ? evt.direction : '';
    var key = makeRefKey(sid, direction);

    // 基线融合勾选且有标准曲线 → 返回融合后的标准曲线
    var fusionChk = document.getElementById('chkFusion');
    var useFusion = fusionChk && fusionChk.checked;
    if (useFusion && standardCurveData[key]) {
        return standardCurveData[key];
    }

    // 否则返回原始参考曲线
    var ref = referenceCurveData[key];
    if (ref) return ref;

    // 降级：无方向匹配时返回该 switchId 的任一条
    if (useFusion) {
        for (var sk in standardCurveData) {
            if (standardCurveData.hasOwnProperty(sk) && sk.indexOf(sid + '|') === 0) {
                return standardCurveData[sk];
            }
        }
    }
    for (var k in referenceCurveData) {
        if (referenceCurveData.hasOwnProperty(k) && k.indexOf(sid + '|') === 0) {
            return referenceCurveData[k];
        }
    }
    return null;
}

function addReferenceSeries() {
    // 至少一个图表有参考曲线才干
    var hasAny = getReferenceForChart('chart1') || getReferenceForChart('chart2')
              || getReferenceForChart('chart3') || getReferenceForChart('chart4');
    if (!hasAny) return;
    removeReferenceSeries();

    var showA = document.getElementById('chkCurrentA').checked;
    var showB = document.getElementById('chkCurrentB').checked;
    var showC = document.getElementById('chkCurrentC').checked;
    var showPower = document.getElementById('chkPower').checked;

    // 电流图表（chart1, chart3）: 参考曲线 A/B/C，各图表独立查方向
    var currentCharts = [charts.chart1, charts.chart3];
    for (var ci = 0; ci < currentCharts.length; ci++) {
        var cChart = currentCharts[ci];
        if (!cChart) continue;
        var ref = getReferenceForChart(cChart._chartKey || (ci === 0 ? 'chart1' : 'chart3'));
        if (!ref) continue;
        if (ref.currentA) {
            cChart.addSeries({
                name: '参考曲线：电流(A)',
                color: colors.refCurrentA,
                data: ref.currentA,
                lineWidth: 1.5,
                dashStyle: 'dash',
                marker: { enabled: false },
                visible: showA
            }, false);
        }
        if (ref.currentB) {
            cChart.addSeries({
                name: '参考曲线：电流(B)',
                color: colors.refCurrentB,
                data: ref.currentB,
                lineWidth: 1.5,
                dashStyle: 'dash',
                marker: { enabled: false },
                visible: showB
            }, false);
        }
        if (ref.currentC) {
            cChart.addSeries({
                name: '参考曲线：电流(C)',
                color: colors.refCurrentC,
                data: ref.currentC,
                lineWidth: 1.5,
                dashStyle: 'dash',
                marker: { enabled: false },
                visible: showC
            }, false);
        }
        try { cChart.redraw(); } catch(e) {}
    }

    // 功率图表（chart2, chart4）: 各图表独立查方向
    var powerChartKeys = ['chart2', 'chart4'];
    for (var pi = 0; pi < powerChartKeys.length; pi++) {
        var pChart = charts[powerChartKeys[pi]];
        if (!pChart) continue;
        var ref2 = getReferenceForChart(powerChartKeys[pi]);
        if (!ref2 || !ref2.power) continue;
        pChart.addSeries({
            name: '参考曲线：功率',
            color: colors.refPower,
            data: transformPowerData(ref2.power),
            lineWidth: 2,
            marker: { enabled: false },
            visible: showPower
        }, false);
        try { pChart.redraw(); } catch(e) {}
    }
}

// ===== 移除参考曲线 =====
function removeReferenceSeries() {
    var keys = ['chart1', 'chart2', 'chart3', 'chart4'];
    for (var k = 0; k < keys.length; k++) {
        var chart = charts[keys[k]];
        if (!chart) continue;
        var i = chart.series.length - 1;
        while (i >= 0) {
            var s = chart.series[i];
            if (s.name && (s.name.indexOf('参考曲线：') === 0 || s.name.indexOf('参考-') === 0)) {
                try { s.remove(false); } catch(e) {}
            }
            i = i - 1;
        }
        try { chart.redraw(); } catch(e) {}
    }
}

// ===== D7: 为功率图表添加基线分段水平线 + 时长垂直线 =====
function addBaselineLines() {
    var bl = getCurrentBaseline();
    if (!bl) return;
    removeBaselineLines();

    // 功率图表基线定义（值 + 颜色 + 图例标签 + 线型）
    var powerLines = [
        { key: 'spike',  value: bl.refSpikePeak,  color: '#FF9800', dashStyle: 'ShortDash', lineWidth: 2, label: '基线-尖峰 '  + bl.refSpikePeak.toFixed(2)  + ' kW' },
        { key: 'unlock', value: bl.refUnlockMean, color: '#00BCD4', dashStyle: 'ShortDash', lineWidth: 2, label: '基线-解锁 ' + bl.refUnlockMean.toFixed(2) + ' kW' },
        { key: 'conv',   value: bl.refConvMean,   color: '#42A5F5', dashStyle: 'ShortDash', lineWidth: 2, label: '基线-转换 '   + bl.refConvMean.toFixed(2)   + ' kW' },
        { key: 'lock',   value: bl.refLockMean,   color: '#FF7043', dashStyle: 'ShortDash', lineWidth: 2, label: '基线-锁闭 '  + bl.refLockMean.toFixed(2)  + ' kW' },
        { key: 'tail',   value: bl.refTailMean,   color: '#9C27B0', dashStyle: 'ShortDash', lineWidth: 2, label: '基线-缓放 '  + bl.refTailMean.toFixed(2)  + ' kW' }
    ];

    // 功率图表（chart2 = 当前事件功率, chart4 = 上一次事件功率）
    var powerChartKeys = ['chart2', 'chart4'];
    for (var pi = 0; pi < powerChartKeys.length; pi++) {
        var pChart = charts[powerChartKeys[pi]];
        var phases = getPhasesForChart(powerChartKeys[pi]);
        if (!pChart || !phases) continue;

        // 阶段 → 基线值 对应关系
        var segDefs = [
            { line: powerLines[0], startKey: 'spikeStartSec',  endKey: 'spikeEndSec' },
            { line: powerLines[1], startKey: 'unlockStartSec', endKey: 'unlockEndSec' },
            { line: powerLines[2], startKey: 'convStartSec',   endKey: 'convEndSec' },
            { line: powerLines[3], startKey: 'lockStartSec',   endKey: 'lockEndSec' },
            { line: powerLines[4], startKey: 'tailStartSec',   endKey: 'tailEndSec' }
        ];

        for (var si = 0; si < segDefs.length; si++) {
            var seg = segDefs[si];
            var startSec = phases[seg.startKey];
            var endSec = phases[seg.endKey];
            // 跳过无效段（起止相同或未定义）
            if (startSec === undefined || endSec === undefined || startSec >= endSec) continue;

            var segValue = transformPowerValue(seg.line.value);
            pChart.addSeries({
                id: 'baseline-' + seg.line.key,
                name: seg.line.label,
                color: seg.line.color,
                data: [[startSec, segValue], [endSec, segValue]],
                dashStyle: seg.line.dashStyle,
                lineWidth: seg.line.lineWidth,
                marker: { enabled: false },
                showInLegend: true,
                enableMouseTracking: false
            }, false);
        }
        try { pChart.redraw(); } catch(e) {}
    }

    // 仅功率图表: 时长垂直线（plotLine 全高）+ 图例项
    var powerDurCharts = [charts.chart2, charts.chart4];
    var durationLabel = '基线时长 ' + bl.refDurationSec.toFixed(2) + 's';
    for (var ac = 0; ac < powerDurCharts.length; ac++) {
        var aChart = powerDurCharts[ac];
        if (!aChart || !aChart.xAxis || !aChart.xAxis[0]) continue;
        aChart.xAxis[0].addPlotLine({
            id: 'baseline-duration',
            color: '#AAAAAA',
            dashStyle: 'dash',
            width: 2,
            value: bl.refDurationSec,
            zIndex: 4
        });
        aChart.addSeries({
            id: 'baseline-duration',
            name: durationLabel,
            color: '#AAAAAA',
            data: [],
            dashStyle: 'dash',
            lineWidth: 2,
            marker: { enabled: false },
            showInLegend: true,
            enableMouseTracking: false
        }, false);
        try { aChart.redraw(); } catch(e) {}
    }
}

// ===== D7: 为电流图表（chart1/chart3）添加每相分段基线水平线 + 时长垂直线 =====
function addCurrentBaselineLines() {
    var cbl = getCurBaseline();
    if (!cbl) return;
    removeCurrentBaselineLines();

    var phases = ['A', 'B', 'C'];
    var segDefs = [
        { key: 'spike',  suffix: 'SpikePeak',  label: '尖峰', color: '#FF9800' },
        { key: 'unlock', suffix: 'UnlockMean', label: '解锁', color: '#00BCD4' },
        { key: 'conv',   suffix: 'ConvMean',   label: '转换', color: '#42A5F5' },
        { key: 'lock',   suffix: 'LockMean',   label: '锁闭', color: '#FF7043' },
        { key: 'tail',   suffix: 'TailMean',   label: '缓放', color: '#9C27B0' }
    ];
    var phaseStyles = {
        'A': { dashStyle: 'Solid', lineWidth: 2 },
        'B': { dashStyle: 'ShortDash', lineWidth: 2 },
        'C': { dashStyle: 'LongDash', lineWidth: 2 }
    };

    // 电流图表（chart1 = 当前事件, chart3 = 上一次事件）
    var currentChartKeys = ['chart1', 'chart3'];
    for (var ci = 0; ci < currentChartKeys.length; ci++) {
        var cChart = charts[currentChartKeys[ci]];
        if (!cChart) continue;

        var evt = (currentChartKeys[ci] === 'chart1')
            ? chartDataCache.currentEvent
            : chartDataCache.prevEvent;
        var curPhases = (evt && evt.currentPhases) ? evt.currentPhases : null;

        for (var pi = 0; pi < phases.length; pi++) {
            var phase = phases[pi];
            var pStyle = phaseStyles[phase];
            var ph = curPhases ? curPhases[phase] : null;

            for (var si = 0; si < segDefs.length; si++) {
                var seg = segDefs[si];
                var refField = 'ref' + seg.suffix + phase;
                var refValue = cbl[refField];
                if (refValue === undefined || refValue === null) continue;

                var startKey = seg.key + 'StartSec';
                var endKey = seg.key + 'EndSec';
                var startSec = ph ? ph[startKey] : undefined;
                var endSec = ph ? ph[endKey] : undefined;
                if (startSec === undefined || endSec === undefined || startSec >= endSec) continue;

                var seriesId = 'curbl-' + phase + '-' + seg.key;
                var label = phase + '-' + seg.label + '基线 ' + refValue.toFixed(2) + ' A';

                cChart.addSeries({
                    id: seriesId,
                    name: label,
                    color: seg.color,
                    data: [[startSec, refValue], [endSec, refValue]],
                    dashStyle: pStyle.dashStyle,
                    lineWidth: pStyle.lineWidth,
                    marker: { enabled: false },
                    showInLegend: true,
                    enableMouseTracking: false
                }, false);
            }
        }
        try { cChart.redraw(); } catch(e) {}
    }

    // 仅电流图表: 电流基线时长垂直线（功率图表已有功率基线时长线）
    var curDurCharts = [charts.chart1, charts.chart3];
    var durLabel = '电流基线时长 ' + cbl.refDurationSec.toFixed(2) + 's';
    for (var ac = 0; ac < curDurCharts.length; ac++) {
        var aChart = curDurCharts[ac];
        if (!aChart || !aChart.xAxis || !aChart.xAxis[0]) continue;
        aChart.xAxis[0].addPlotLine({
            id: 'curbl-duration',
            color: '#FFD700',
            dashStyle: 'dash',
            width: 2,
            value: cbl.refDurationSec,
            zIndex: 4
        });
        aChart.addSeries({
            id: 'curbl-duration',
            name: durLabel,
            color: '#FFD700',
            data: [],
            dashStyle: 'dash',
            lineWidth: 2,
            marker: { enabled: false },
            showInLegend: true,
            enableMouseTracking: false
        }, false);
        try { aChart.redraw(); } catch(e) {}
    }
}

        for (var j = 0; j < ps.length; j++) {
            var name2 = ps[j].name;
            if (name2 === '功率') { if (showPower) ps[j].show(); else ps[j].hide(); }
            else if (name2 === '参考曲线：功率') { if (showPower && showRef) ps[j].show(); else ps[j].hide(); }
        }
    }

    // 阈值线显隐
    var allCharts = [charts.chart1, charts.chart2, charts.chart3, charts.chart4];
    for (var t = 0; t < allCharts.length; t++) {
        toggleThreshold(allCharts[t], showThreshold);
    }
}

// ===== 阈值线显隐 =====
function toggleThreshold(chart, show) {
    if (!chart || !chart.yAxis || !chart.yAxis[0]) return;
    var axis = chart.yAxis[0];
    if (show) {
        if (axis.options.plotLines && axis.options.plotLines.length > 0) {
            for (var i = 0; i < axis.options.plotLines.length; i++) {
                axis.addPlotLine(axis.options.plotLines[i]);
            }
        }
    } else {
        axis.removePlotLine('threshold-line');
    }
}

// ===== 销毁所有图表 =====
function destroyCharts() {
    var keys = ['chart1', 'chart2', 'chart3', 'chart4'];
    for (var k = 0; k < keys.length; k++) {
        if (charts[keys[k]] && charts[keys[k]].destroy) {
            try { charts[keys[k]].destroy(); } catch(e) {}
            charts[keys[k]] = null;
        }
    }
}

// ===== 清空图表 =====
function clearCharts() {
    destroyCharts();
    // 注意：不清除 referenceCurveData 字典，参考曲线是按转辙机号持久保留的
    document.getElementById('emptyState').style.display = 'block';
    document.getElementById('btnSetReference').disabled = true;
    document.getElementById('btnSetReference').innerHTML = '设定参考曲线';
    document.getElementById('refCurveStatus').style.display = 'none';
    document.getElementById('btnResetZoom').disabled = true;
    chartDataCache = null;
    // D5: 重置诊断条
    renderDiagnosisBar(null);
}

// ===== 更新阈值 =====
function updateThreshold(thresholdJson) {
    var t;
    if (typeof thresholdJson === 'string') {
        try { t = JSON.parse(thresholdJson); } catch(e) { return; }
    } else {
        t = thresholdJson;
    }
    if (chartDataCache) {
        if (t.current !== undefined) chartDataCache.thresholdCurrent = t.current;
        if (t.power !== undefined) chartDataCache.thresholdPower = t.power;
        loadChartData(chartDataCache);
    }
}

// ===== 窗口大小变化自适应 =====
window.onresize = function() {
    var keys = ['chart1', 'chart2', 'chart3', 'chart4'];
    for (var k = 0; k < keys.length; k++) {
        if (charts[keys[k]] && charts[keys[k]].reflow) {
            try { charts[keys[k]].reflow(); } catch(e) {}
        }
    }
};

// ===== 初始状态 =====
function onChartReady() {
    document.getElementById('emptyState').style.display = 'block';
    if (!highchartsReady) {
        showError('Highcharts library not loaded! Check highcharts.js embedded resource.');
    }
    var ds = document.getElementById('diagStatus');
    if (ds) ds.innerText = 'HC:' + (highchartsReady ? 'OK' : 'FAIL');
}
</script>
<script>
onChartReady();
</script>
</body>
